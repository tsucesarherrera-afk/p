const CALENDARIOS_EPI = {
    2025: { inicio: '2024-12-29', fin: '2026-01-03' },
    2026: { inicio: '2026-01-04', fin: '2027-01-02' },
    2027: { inicio: '2027-01-03', fin: '2028-01-01' },
};

let semanaEpidemiologicaManual = null;
let anioEpidemiologicoManual = null;

function getSemanaEpidemiologica() {
    if (semanaEpidemiologicaManual !== null) return parseInt(semanaEpidemiologicaManual);
    const now = new Date();
    const anio = now.getFullYear();
    const cal = CALENDARIOS_EPI[anio];
    if (!cal) {
        const primerEnero = new Date(anio, 0, 1);
        const diaSemana = primerEnero.getDay();
        let inicioSE1 = diaSemana === 0 ? primerEnero : new Date(anio, 0, 1 - diaSemana);
        const dias = Math.floor((now - inicioSE1) / (1000 * 60 * 60 * 24));
        return Math.floor(dias / 7) + 1;
    }
    const inicio = new Date(cal.inicio + 'T00:00:00');
    const fin = new Date(cal.fin + 'T00:00:00');
    if (now < inicio) {
        const calAnterior = CALENDARIOS_EPI[anio - 1];
        if (calAnterior) {
            const inicioAnt = new Date(calAnterior.inicio + 'T00:00:00');
            const dias = Math.floor((now - inicioAnt) / (1000 * 60 * 60 * 24));
            return Math.floor(dias / 7) + 1;
        }
    }
    if (now > fin) {
        const calSiguiente = CALENDARIOS_EPI[anio + 1];
        if (calSiguiente) {
            const inicioSig = new Date(calSiguiente.inicio + 'T00:00:00');
            const dias = Math.floor((now - inicioSig) / (1000 * 60 * 60 * 24));
            return Math.floor(dias / 7) + 1;
        }
    }
    const dias = Math.floor((now - inicio) / (1000 * 60 * 60 * 24));
    return Math.floor(dias / 7) + 1;
}

function getAnioEpidemiologico() {
    if (anioEpidemiologicoManual !== null) return parseInt(anioEpidemiologicoManual);
    return new Date().getFullYear();
}

function getAnio() { return new Date().getFullYear(); }

function calcularSemanas(fur) {
    if(!fur) return 0;
    const hoy = new Date();
    const furDate = new Date(fur);
    const diffDays = Math.floor((hoy - furDate) / (1000 * 60 * 60 * 24));
    return Math.floor(diffDays / 7);
}

function calcularSemanasTexto(fur) {
    if(!fur) return 'INCIERTO';
    const hoy = new Date();
    const furDate = new Date(fur);
    const diffDays = Math.floor((hoy - furDate) / (1000 * 60 * 60 * 24));
    const semanas = Math.floor(diffDays / 7);
    const dias = diffDays % 7;
    if (semanas > 0) return `${semanas} SEMANAS${dias > 0 ? ' Y ' + dias + ' DIAS' : ''}`;
    return `${dias} DIAS`;
}

function calcularFPP(fur) {
    if(!fur) return null;
    const fpp = new Date(fur);
    fpp.setDate(fpp.getDate() + 280);
    return fpp;
}

function calcularTrimestre(semanas) {
    if (semanas >= 1 && semanas <= 13) return '1ER TRIMESTRE';
    if (semanas >= 14 && semanas <= 27) return '2DO TRIMESTRE';
    if (semanas >= 28) return '3ER TRIMESTRE';
    return 'INCIERTO';
}

function calcularARO(edad, numGestas, enfermedad, cualEnfermedad, semanas) {
    const enfermedadUpper = (cualEnfermedad || '').toUpperCase();
    const altoRiesgo = ['HTA', 'HIPERTENSION', 'DIABETES', 'ASMA BRONQUIAL', 'SIFILIS', 'ESQUIZOFRENIA', 'DISCAPACIDAD', 'PREECLAMPSIA', 'ECLAMPSIA'];

    if (enfermedad && altoRiesgo.some(r => enfermedadUpper.includes(r))) return 'ARO III';
    if (numGestas >= 5) return 'ARO III';
    if (edad >= 35 && enfermedad) return 'ARO III';
    if (semanas > 42) return 'ARO III';
    if (edad < 18) return 'ARO II';
    if (edad >= 35) return 'ARO II';
    if (enfermedad) return 'ARO II';
    if (numGestas >= 3) return 'ARO II';
    return 'ARO I';
}

function calcularSemanasActuales(fechaRegistro, semanasAlRegistro) {
    if (!fechaRegistro || !semanasAlRegistro) return 'INCIERTO';
    const regDate = new Date(fechaRegistro);
    const today = new Date();
    const diffTime = today - regDate;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    const diffWeeks = Math.floor(diffDays / 7);
    const diffDaysRem = diffDays % 7;
    const semMatch = String(semanasAlRegistro).match(/(\d+)/);
    const semBase = semMatch ? parseInt(semMatch[1]) : 0;
    const totalWeeks = semBase + diffWeeks;
    if (totalWeeks >= 42) return `${totalWeeks} SEMANAS (POSTDATOS)`;
    return `${totalWeeks} SEMANAS${diffDaysRem > 0 ? ' Y ' + diffDaysRem + ' DIAS' : ''}`;
}

function calcularFechaPartoPuerpera(fechaRegistro, semanasAlRegistro) {
    if (!fechaRegistro || !semanasAlRegistro) return '';
    const regDate = new Date(fechaRegistro);
    const semMatch = String(semanasAlRegistro).match(/(\d+)/);
    const semBase = semMatch ? parseInt(semMatch[1]) : 0;
    const diasRestantes = (42 - semBase) * 7;
    const fpp = new Date(regDate);
    fpp.setDate(fpp.getDate() + diasRestantes);
    return fpp.toISOString().split('T')[0];
}

function getSemanaEpidemiologicaFecha(fecha) {
    const d = new Date(fecha);
    if (isNaN(d)) return 0;
    d.setHours(0, 0, 0, 0);
    d.setDate(d.getDate() + 4 - (d.getDay() || 7));
    const yearStart = new Date(d.getFullYear(), 0, 1);
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return weekNo;
}

function showAlert(message, type = 'info') {
    const container = $('alertContainer');
    if(!container) return;
    const alert = document.createElement('div');
    alert.className = `alert alert-${type}`;
    alert.innerHTML = `<span>${message}</span>`;
    alert.style.marginBottom = '10px';
    container.appendChild(alert);
    setTimeout(() => alert.remove(), 5000);
}

async function initAuth() {
    if (!supabase) {
        showLogin();
        setTimeout(() => {
            const err = $('loginError');
            if(err) { err.textContent = 'Error: No se pudo conectar con Supabase. Verifique su conexión.'; err.classList.remove('hidden'); }
        }, 100);
        return;
    }
    try {
        const { data: { session }, error } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            await loadUserProfile();
            if (currentProfile) {
                showApp();
            } else {
                showLogin();
                setTimeout(() => {
                    const err = $('loginError');
                    if(err) { 
                        err.textContent = 'Error: No se pudo cargar su perfil de usuario. Contacte al administrador.'; 
                        err.classList.remove('hidden'); 
                    }
                }, 100);
            }
        } else {
            showLogin();
        }
    } catch(e) {
        console.error('Error checking session:', e);
        showLogin();
    }
    supabase.auth.onAuthStateChange((event, session) => {
        if(event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            loadUserProfile().then(() => {
                if (currentProfile) showApp();
            });
        } else if(event === 'SIGNED_OUT') {
            currentUser = null; currentProfile = null; 
            semanaEpidemiologicaManual = null;
            anioEpidemiologicoManual = null;
            showLogin();
            showAlert('Sesión cerrada correctamente', 'info');
        }
    });
}

async function login() {
    if (!supabase) { showAlert('Supabase no disponible', 'danger'); return; }
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    const btn = $('loginBtn');
    const errorDiv = $('loginError');

    if(!email || !password) {
        errorDiv.textContent = 'Por favor ingrese usuario y contraseña';
        errorDiv.classList.remove('hidden');
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px;"></span> Ingresando...';
    errorDiv.classList.add('hidden');

    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
        currentUser = data.user;
        await loadUserProfile();
        if (currentProfile) {
            showApp();
            showAlert('¡Bienvenido al Sistema Ruta Materna EPI!', 'success');
        } else {
            throw new Error('No se pudo cargar el perfil de usuario');
        }
    } catch(error) {
        errorDiv.textContent = error.message === 'Invalid login credentials' 
            ? 'Usuario o contraseña incorrectos' 
            : 'Error al iniciar sesión: ' + error.message;
        errorDiv.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>🔐</span> Ingresar al Sistema';
    }
}

async function loadUserProfile() {
    if(!currentUser || !supabase) return;
    try {
        const { data, error } = await supabase
            .from('perfiles_usuarios')
            .select('*, consultorios(*)')
            .eq('id', currentUser.id)
            .single();
        if(error) {
            console.error('Error cargando perfil:', error);
            currentProfile = null;
            showAlert('Error al cargar perfil: ' + error.message, 'danger');
        } else {
            currentProfile = data;
        }
    } catch(e) {
        console.error('Exception cargando perfil:', e);
        currentProfile = null;
    }
}

async function logout() {
    if (!supabase) return;
    try { 
        await supabase.auth.signOut(); 
        currentUser = null; 
        currentProfile = null; 
        semanaEpidemiologicaManual = null;
        anioEpidemiologicoManual = null;
        showLogin(); 
    }
    catch(e) { console.error('Error logout:', e); }
}

async function loadDashboardData() {
    if (!supabase) return;
    try {
        // Cargar gestantes
        const { data: gestantes, error: errG } = await supabase.from('gestantes').select('*');
        gestantesData = gestantes || [];

        const total = gestantesData.length;
        const enControl = gestantesData.filter(g => g.en_control_prenatal).length;
        const gestantesActivas = gestantesData.filter(g => g.estado_actual === 'gestante').length;
        const puerperas = gestantesData.filter(g => g.estado_actual === 'puerpera' || g.estado_actual === 'lactante').length;
        const juveniles = gestantesData.filter(g => g.edad < 18).length;
        const aro3 = gestantesData.filter(g => g.aro === 'ARO III').length;

        $('statTotalGestantes').textContent = total;
        $('statEnControl').textContent = enControl;
        $('statGestantesActivas').textContent = gestantesActivas;
        $('statPuerperas').textContent = puerperas;
        $('statJuveniles').textContent = juveniles;
        $('statARO3').textContent = aro3;

        // Registros esta semana
        const semanaActual = getSemanaEpidemiologica();
        const anioActual = getAnioEpidemiologico();
        const { count: estaSemana } = await supabase.from('registros_ruta_materna').select('*', { count: 'exact', head: true }).eq('semana_epidemiologica', semanaActual).eq('anio', anioActual);
        $('statEstaSemana').textContent = estaSemana || 0;

        // Controles semanales
        const { count: controlesSem } = await supabase.from('controles_semanales').select('*', { count: 'exact', head: true }).eq('semana_epidemiologica', semanaActual).eq('anio', anioActual);
        $('statControlesSemana').textContent = controlesSem || 0;

        // Charts - SOLO GESTANTES ACTIVAS
        const gestantesActivasArr = gestantesData.filter(g => g.estado_actual === 'gestante');

        // Trimestre
        const t1 = gestantesActivasArr.filter(g => (g.trimestre || '').includes('1ER')).length;
        const t2 = gestantesActivasArr.filter(g => (g.trimestre || '').includes('2DO')).length;
        const t3 = gestantesActivasArr.filter(g => (g.trimestre || '').includes('3ER')).length;
        const tInc = gestantesActivasArr.filter(g => (g.trimestre || '').includes('INCIERTO') || !g.trimestre).length;
        $('trim1Count').textContent = t1;
        $('trim2Count').textContent = t2;
        $('trim3Count').textContent = t3;
        updateChart('trimestreChart', 'bar', ['1er Trim.', '2do Trim.', '3er Trim.', 'Incierto'], [t1, t2, t3, tInc], ['#3b82f6', '#10b981', '#8b5cf6', '#9ca3af']);

        // ARO
        const a1 = gestantesActivasArr.filter(g => g.aro === 'ARO I').length;
        const a2 = gestantesActivasArr.filter(g => g.aro === 'ARO II').length;
        const a3c = gestantesActivasArr.filter(g => g.aro === 'ARO III').length;
        $('aro1Count').textContent = a1;
        $('aro2Count').textContent = a2;
        $('aro3Count').textContent = a3c;
        updateChart('aroChart', 'doughnut', ['ARO I', 'ARO II', 'ARO III'], [a1, a2, a3c], ['#10b981', '#f59e0b', '#ef4444']);

        // Estado
        const estGest = gestantesData.filter(g => g.estado_actual === 'gestante').length;
        const estPuer = gestantesData.filter(g => g.estado_actual === 'puerpera' || g.estado_actual === 'lactante').length;
        $('estGestCount').textContent = estGest;
        $('estPuerCount').textContent = estPuer;
        updateChart('estadoChart', 'pie', ['Gestantes', 'Puérperas/Lact.'], [estGest, estPuer], ['#ec4899', '#8b5cf6']);

        // Semanas EPI chart
        updateSemanaEpiChart('bar');

        // Tabla consultorios
        renderDashConsultorios();

        // Tabla meses
        renderDashMeses();

        // Últimos registros
        const { data: ultimosRegistros } = await supabase
            .from('registros_ruta_materna')
            .select('*, gestantes(nombres, apellidos, cedula), consultorios(nombre)')
            .order('created_at', { ascending: false }).limit(10);

        const tbody = $('dashboardTableBody');
        if(!ultimosRegistros?.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay registros recientes</td></tr>';
        } else {
            tbody.innerHTML = ultimosRegistros.map(r => `
                <tr><td>${formatDate(r.fecha_registro)}</td><td>${r.gestantes?.nombres || ''} ${r.gestantes?.apellidos || ''}</td><td>${r.gestantes?.cedula || '-'}</td>
                <td><span class="badge badge-${r.tipo_registro}">${r.tipo_registro}</span></td><td>${r.consultorios?.nombre || '-'}</td><td>SE ${r.semana_epidemiologica}</td></tr>
            `).join('');
        }
    } catch(e) { console.error('Error loading dashboard:', e); }
}

function updateChart(canvasId, type, labels, data, colors) {
    const ctx = document.getElementById(canvasId);
    if (!ctx) return;
    if (charts[canvasId]) charts[canvasId].destroy();
    charts[canvasId] = new Chart(ctx, {
        type: type,
        data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 0 }] },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
            scales: type === 'bar' ? { y: { beginAtZero: true, ticks: { stepSize: 1 } } } : {}
        }
    });
}

function updateSemanaEpiChart(type) {
    const gestantesActivas = gestantesData.filter(g => g.estado_actual === 'gestante');
    const semStats = {};
    for (let i = 1; i <= 53; i++) semStats[i] = 0;

    gestantesActivas.forEach(g => {
        const s = g.semana_epi || getSemanaEpidemiologicaFecha(g.fecha_registro) || 0;
        if (s >= 1 && s <= 53) semStats[s]++;
    });

    const labels = [], dataTotal = [], dataAcum = [];
    let acum = 0;
    for (let i = 1; i <= 53; i++) {
        if (semStats[i] > 0 || (i >= getSemanaEpidemiologica() - 2 && i <= getSemanaEpidemiologica() + 2)) {
            labels.push(`Sem ${i}`);
            dataTotal.push(semStats[i]);
            acum += semStats[i];
            dataAcum.push(acum);
        }
    }

    const ctx = document.getElementById('semanaEpiChart');
    if (!ctx) return;
    if (charts['semanaEpiChart']) charts['semanaEpiChart'].destroy();

    charts['semanaEpiChart'] = new Chart(ctx, {
        type: type,
        data: {
            labels: labels,
            datasets: [
                { label: 'Por Semana', data: dataTotal, backgroundColor: '#3b82f6', borderColor: '#3b82f6', borderWidth: 2, tension: 0.4 },
                { label: 'Acumulado', data: dataAcum, backgroundColor: 'rgba(16, 185, 129, 0.2)', borderColor: '#10b981', borderWidth: 2, fill: true, tension: 0.4, type: 'line' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
}

function renderDashConsultorios() {
    const mesActual = new Date().getMonth();
    const anioActual = new Date().getFullYear();
    const conStats = {};

    consultoriosData.forEach(c => {
        const arr = gestantesData.filter(g => {
            if (!g.fecha_registro) return false;
            const d = new Date(g.fecha_registro);
            return g.consultorio_id === c.id && d.getMonth() === mesActual && d.getFullYear() === anioActual;
        });
        conStats[c.nombre] = {
            gest: arr.filter(g => g.estado_actual === 'gestante').length,
            puer: arr.filter(g => g.estado_actual !== 'gestante').length,
            juv: arr.filter(g => g.edad < 18).length,
            aro3: arr.filter(g => g.aro === 'ARO III').length
        };
    });

    $('dashConsultorios').innerHTML = Object.entries(conStats)
        .sort((a, b) => (b[1].gest + b[1].puer) - (a[1].gest + a[1].puer))
        .map(([name, s]) => `
            <tr><td><strong>${name}</strong></td>
            <td class="text-center" style="color:var(--color-pink);font-weight:600;">${s.gest}</td>
            <td class="text-center" style="color:var(--color-purple);">${s.puer}</td>
            <td class="text-center ${s.juv > 0 ? 'text-warning font-bold' : 'text-gray-400'}">${s.juv}</td>
            <td class="text-center ${s.aro3 > 0 ? 'text-danger font-bold' : 'text-gray-400'}">${s.aro3}</td></tr>
        `).join('');
}

function renderDashMeses() {
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const anioActual = getAnio();
    let acumulado = 0;

    $('dashMeses').innerHTML = meses.map((m, i) => {
        const arr = gestantesData.filter(g => {
            if (!g.fecha_registro) return false;
            const d = new Date(g.fecha_registro);
            return d.getMonth() === i && d.getFullYear() === anioActual;
        });
        const gestMes = arr.filter(g => g.estado_actual === 'gestante').length;
        acumulado += gestMes;
        return `<tr><td><strong>${m}</strong></td>
            <td class="text-center">${arr.length}</td>
            <td class="text-center" style="color:var(--color-pink);font-weight:600;">${gestMes}</td>
            <td class="text-center" style="color:var(--color-purple);">${arr.filter(g => g.estado_actual !== 'gestante').length}</td>
            <td class="text-center font-bold" style="color:var(--color-primary);">${acumulado}</td></tr>`;
    }).join('');
}

async function buscarControlSemanal() {
    if (!supabase) { showAlert('Supabase no disponible', 'danger'); return; }
    const cedula = $('csCedulaBusqueda').value.trim();
    if (!cedula) { showAlert('Ingrese un número de cédula', 'warning'); return; }

    $('csResultadoBusqueda').classList.add('hidden');
    $('csPacienteEncontrado').classList.add('hidden');
    $('csNoEncontrado').classList.add('hidden');

    try {
        const { data: gestantes, error } = await supabase
            .from('gestantes')
            .select('*, consultorios(nombre)')
            .ilike('cedula', `%${cedula}%`)
            .limit(1);

        if (error) throw error;

        if (!gestantes || gestantes.length === 0) {
            $('csNoEncontrado').classList.remove('hidden');
            return;
        }

        const g = gestantes[0];
        $('csGestanteId').value = g.id;
        $('csNombrePaciente').textContent = `${g.nombres || ''} ${g.apellidos || ''}`.trim() || 'SIN NOMBRE';
        $('csDatosBasicos').textContent = `Cédula: ${g.cedula} | Edad: ${g.edad || '-'} años | Consultorio: ${g.consultorios?.nombre || 'No asignado'}`;
        $('csCedula').textContent = g.cedula;
        $('csEdad').textContent = (g.edad || '-') + ' años';
        $('csConsultorio').textContent = g.consultorios?.nombre || 'No asignado';
        $('csARO').textContent = g.aro || 'ARO I';
        $('csARO').style.color = g.aro === 'ARO III' ? '#dc2626' : g.aro === 'ARO II' ? '#d97706' : '#16a34a';
        $('csFUR').textContent = g.fur ? formatDate(g.fur) : (g.fur_incierto ? 'INCIERTO' : '-');
        $('csSemRegistro').textContent = g.sem_gesta || 'INCIERTO';
        $('csFechaRegistro').textContent = g.fecha_registro ? formatDate(g.fecha_registro) : '-';

        const semCalc = calcularSemanasActuales(g.fecha_registro, g.sem_gesta);
        $('csSemCalculada').textContent = semCalc;

        const badge = $('csEstadoBadge');
        if (g.estado_actual === 'gestante') {
            badge.className = 'badge badge-gestante';
            badge.innerHTML = '🤰 GESTANTE';
            $('csPuerperaAlert').classList.add('hidden');
        } else {
            badge.className = 'badge badge-puerpera';
            badge.innerHTML = `🍼 ${g.estado_actual.toUpperCase()}`;
            $('csPuerperaAlert').classList.remove('hidden');
            const fpp = calcularFechaPartoPuerpera(g.fecha_registro, g.sem_gesta);
            $('csFechaParto').textContent = fpp || 'No calculable';
        }

        $('csFechaControl').valueAsDate = new Date();
        $('csSemanaEpi').value = getSemanaEpidemiologica();
        $('csObsSemanas').textContent = semCalc;
        $('csSemanasGestacionales').value = semCalc;

        // Cargar historial
        await renderHistorialControl(g.id);

        $('csPacienteEncontrado').classList.remove('hidden');
        $('csResultadoBusqueda').classList.remove('hidden');
        $('csResultadoBusqueda').innerHTML = `
            <div class="alert alert-success" style="margin:0;">
                <span>✅</span> Paciente encontrado: <strong>${g.nombres} ${g.apellidos}</strong>
            </div>
        `;
    } catch(e) {
        console.error('Error buscando:', e);
        showAlert('Error al buscar paciente', 'danger');
    }
}

async function renderHistorialControl(gestanteId) {
    if (!supabase) return;
    try {
        const { data: historial, error } = await supabase
            .from('controles_semanales')
            .select('*')
            .eq('gestante_id', gestanteId)
            .order('fecha_control', { ascending: false });

        const tbody = $('csHistorial');
        if (error || !historial?.length) {
            tbody.innerHTML = '<tr><td colspan="9" class="text-center">No hay controles semanales registrados</td></tr>';
            return;
        }

        tbody.innerHTML = historial.map(c => `
            <tr>
                <td><strong>${c.semana_epidemiologica}</strong></td>
                <td>${formatDate(c.fecha_control)}</td>
                <td>${c.peso || '-'}</td>
                <td>${c.presion_arterial || '-'}</td>
                <td>${c.altura_uterina || '-'}</td>
                <td>${c.frecuencia_cardiaca_fetal || '-'}</td>
                <td style="font-weight:600;color:var(--color-teal);">${c.semanas_gestacionales || '-'}</td>
                <td><span class="badge badge-${c.motivo?.toLowerCase() || 'control'}">${c.motivo || 'CONTROL'}</span></td>
                <td style="font-size:12px;color:var(--color-gray-600);max-width:200px;" class="text-truncate">${c.observaciones || '-'}</td>
            </tr>
        `).join('');
    } catch(e) {
        console.error('Error cargando historial:', e);
    }
}

async function guardarControlSemanal(e) {
    e.preventDefault();
    if (!supabase) { showAlert('Supabase no disponible', 'danger'); return; }

    const gestanteId = $('csGestanteId').value;
    if (!gestanteId) { showAlert('Error: No se seleccionó paciente', 'danger'); return; }

    const control = {
        gestante_id: gestanteId,
        consultorio_id: currentProfile?.consultorio_id,
        semana_epidemiologica: parseInt($('csSemanaEpi').value),
        anio: getAnioEpidemiologico(),
        fecha_control: $('csFechaControl').value,
        peso: parseFloat($('csPeso').value) || null,
        presion_arterial: $('csPA').value || null,
        altura_uterina: parseFloat($('csAlturaUterina').value) || null,
        frecuencia_cardiaca_fetal: parseInt($('csFCF').value) || null,
        semanas_gestacionales: $('csSemanasGestacionales').value,
        motivo: $('csMotivo').value,
        observaciones: $('csObservaciones').value,
        registrado_por: currentUser?.id
    };

    try {
        const { error } = await supabase.from('controles_semanales').insert([control]);
        if (error) throw error;
        showAlert('Control semanal guardado exitosamente', 'success');

        // Limpiar campos
        $('csPeso').value = '';
        $('csPA').value = '';
        $('csAlturaUterina').value = '';
        $('csFCF').value = '';
        $('csObservaciones').value = '';

        await renderHistorialControl(gestanteId);
    } catch(e) {
        showAlert('Error al guardar control: ' + e.message, 'danger');
    }
}

function limpiarControlSemanal() {
    $('csCedulaBusqueda').value = '';
    $('csPacienteEncontrado').classList.add('hidden');
    $('csNoEncontrado').classList.add('hidden');
    $('csResultadoBusqueda').classList.add('hidden');
}

                <div class="form-row">

function calcularNuevoEmbarazo() {
    const furVal = $('neFur').value;
    if (!furVal) return;
    const fur = new Date(furVal);
    const today = new Date();
    const diffDays = Math.floor((today - fur) / (1000 * 60 * 60 * 24));
    const weeks = Math.floor(diffDays / 7);
    const days = diffDays % 7;
    const semText = weeks > 0 ? `${weeks} SEMANAS${days > 0 ? ' Y ' + days + ' DIAS' : ''}` : `${days} DIAS`;
    $('neSemGesta').value = semText;
    const fpp = new Date(fur);
    fpp.setDate(fpp.getDate() + 280);
    $('neFpp').value = fpp.toISOString().split('T')[0];
}

async function guardarNuevoEmbarazo(oldId) {
    if (!supabase) return;
    const oldG = gestantesData.find(x => x.id === oldId);
    if (!oldG) return;

    const fur = $('neFur').value;
    const fechaRegistro = $('neFechaRegistro').value;
    const consultorioId = $('neConsultorio').value;

    if (!fur || !consultorioId) { showAlert('Complete todos los campos obligatorios', 'warning'); return; }

    const semGesta = $('neSemGesta').value;
    const fpp = $('neFpp').value;
    const semanas = calcularSemanas(fur);

    const newG = {
        cedula: oldG.cedula,
        consultorio_id: consultorioId,
        fecha_registro: fechaRegistro,
        nombres: oldG.nombres,
        apellidos: oldG.apellidos,
        fecha_nacimiento: oldG.fecha_nacimiento,
        edad: oldG.edad,
        direccion: oldG.direccion,
        telefono: oldG.telefono,
        telefono_familiar: oldG.telefono_familiar,
        estado: oldG.estado,
        fur: fur,
        num_partos: (oldG.num_partos || 0) + 1,
        num_cesareas: oldG.num_cesareas || 0,
        num_abortos: oldG.num_abortos || 0,
        num_gestas: (oldG.num_gestas || 0) + 1,
        sem_gesta: semGesta,
        fpp: fpp,
        trimestre: calcularTrimestre(semanas),
        en_control_prenatal: true,
        tipo_establecimiento: oldG.tipo_establecimiento,
        posee_carnet_patria: oldG.posee_carnet_patria,
        recibe_micronutrientes: false,
        tiene_enfermedad_asociada: oldG.tiene_enfermedad_asociada,
        enfermedad_cual: oldG.enfermedad_cual,
        inscrita_parto_humanizado: false,
        antecedentes_importantes: oldG.antecedentes_importantes,
        estado_actual: 'gestante',
        aro: calcularARO(oldG.edad, (oldG.num_gestas || 0) + 1, oldG.tiene_enfermedad_asociada, oldG.enfermedad_cual, semanas),
        asic: oldG.asic || 'SI',
        motivo: 'CAPTACION',
        diagnostico: `EMBARAZO SIMPLE DE ${semGesta} x FUR`,
        tipo_consulta: 'Consulta',
        observacion: 'NUEVO EMBARAZO POST-PUERPERIO',
        semana_epi: getSemanaEpidemiologicaFecha(fechaRegistro),
        fur_incierto: false,
        created_by: currentUser?.id
    };

    try {
        const { error } = await supabase.from('gestantes').insert([newG]);
        if (error) throw error;
        showAlert('Nuevo embarazo registrado exitosamente', 'success');
        document.getElementById('modalOverlayNuevoEmbarazo').remove();
        buscarControlSemanal();
    } catch(e) {
        showAlert('Error al registrar nuevo embarazo: ' + e.message, 'danger');
    }
}

async function loadGestantes() {
    if (!supabase) return;
    try {
        let query = supabase.from('gestantes').select('*, consultorios(nombre)').order('created_at', { ascending: false });

        const fCon = $('filterConsultorio')?.value;
        const fEst = $('filterEstado')?.value;
        const fTri = $('filterTrimestre')?.value;
        const fAro = $('filterARO')?.value;

        if(fCon) query = query.eq('consultorio_id', fCon);
        if(fEst) query = query.eq('estado_actual', fEst);
        if(fTri) query = query.ilike('trimestre', `%${fTri}%`);
        if(fAro) query = query.eq('aro', fAro);

        const { data, error } = await query;
        gestantesData = data || [];
        const tbody = $('gestantesTableBody');

        if(error || !gestantesData.length) {
            tbody.innerHTML = '<tr><td colspan="12" class="text-center">No hay gestantes registradas</td></tr>';
            $('gestantesCount').textContent = '0 registros';
            return;
        }

        $('gestantesCount').textContent = gestantesData.length + ' registros';

        tbody.innerHTML = gestantesData.map((g, i) => {
            const semanas = calcularSemanas(g.fur);
            const semActual = calcularSemanasActuales(g.fecha_registro, g.sem_gesta);
            const fpp = g.fpp ? formatDate(g.fpp) : '-';
            const estadoClass = { 'gestante': 'badge-gestante', 'puerpera': 'badge-puerpera', 'lactante': 'badge-lactante', 'alta': 'badge-alta' }[g.estado_actual] || 'badge-gestante';
            const aroClass = g.aro === 'ARO III' ? 'badge-danger' : g.aro === 'ARO II' ? 'badge-warning' : 'badge-success';
            const trimClass = (g.trimestre || '').includes('1ER') ? 'badge-info' : (g.trimestre || '').includes('2DO') ? 'badge-success' : (g.trimestre || '').includes('3ER') ? 'badge-warning' : 'badge-secondary';

            return `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${g.cedula}</strong></td>
                    <td>${g.nombres || ''} ${g.apellidos || ''}</td>
                    <td>${g.edad || '-'} <span style="font-size:10px;${g.edad < 18 ? 'color:#dc2626;font-weight:700;' : 'color:var(--color-gray-400);'}">${g.edad < 18 ? '(J)' : ''}</span></td>
                    <td style="font-size:12px;">${g.consultorios?.nombre || '-'}</td>
                    <td style="font-weight:600;color:var(--color-teal);font-size:12px;">${semActual}</td>
                    <td style="font-size:12px;">${fpp}</td>
                    <td><span class="badge ${aroClass}">${g.aro || 'ARO I'}</span></td>
                    <td><span class="badge ${trimClass}">${g.trimestre || '-'}</span></td>
                    <td><span class="badge ${estadoClass}">${g.estado_actual}</span></td>
                    <td>${g.en_control_prenatal ? '✅' : '❌'}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="verGestante('${g.id}')">👁️</button>
                        <button class="btn btn-sm btn-primary" onclick="editarGestante('${g.id}')">✏️</button>
                        <button class="btn btn-sm btn-success" onclick="nuevoRegistroGestante('${g.id}')">📝</button>
                        ${currentProfile?.rol === 'super_admin' ? `<button class="btn btn-sm btn-danger" onclick="eliminarGestante('${g.id}')">🗑️</button>` : ''}
                    </td>
                </tr>`;
        }).join('');
    } catch(e) {
        console.error('Error loading gestantes:', e);
        $('gestantesTableBody').innerHTML = '<tr><td colspan="12" class="text-center text-danger">Error al cargar datos</td></tr>';
    }
}

function searchGestante() {
    const query = $('searchCedula').value.toLowerCase();
    document.querySelectorAll('#gestantesTableBody tr').forEach(row => {
        const cedula = row.cells[1]?.textContent?.toLowerCase() || '';
        const nombre = row.cells[2]?.textContent?.toLowerCase() || '';
        row.style.display = (cedula.includes(query) || nombre.includes(query)) ? '' : 'none';
    });
}

async function eliminarGestante(id) {
    if (!supabase) return;
    if (!confirm('¿Está seguro de eliminar esta gestante? Esta acción no se puede deshacer.')) return;
    try {
        const { error } = await supabase.from('gestantes').delete().eq('id', id);
        if (error) throw error;
        showAlert('Gestante eliminada correctamente', 'success');
        loadGestantes();
    } catch(e) {
        showAlert('Error al eliminar: ' + e.message, 'danger');
    }
}

function verGestante(id) {
    const g = gestantesData.find(x => x.id === id);
    if(!g) return;
    const semActual = calcularSemanasActuales(g.fecha_registro, g.sem_gesta);
    const fpp = g.fpp ? formatDate(g.fpp) : '-';

    alert(`GESTANTE: ${g.nombres || ''} ${g.apellidos || ''}
Cédula: ${g.cedula}
Edad: ${g.edad || '-'} años
Estado: ${g.estado_actual}
Semanas actuales: ${semActual}
FPP: ${fpp}
ARO: ${g.aro || 'ARO I'}
Trimestre: ${g.trimestre || '-'}
Control: ${g.en_control_prenatal ? 'Sí' : 'No'}
Teléfono: ${g.telefono || '-'}
Dirección: ${g.direccion || '-'}
Observaciones: ${g.observacion || '-'}`.trim());
}

function editarGestante(id) { openModal('gestante', id); }

function nuevoRegistroGestante(gestanteId) {
    navigateTo('controlSemanal');
    setTimeout(() => {
        const g = gestantesData.find(x => x.id === gestanteId);
        if(g && $('csCedulaBusqueda')) {
            $('csCedulaBusqueda').value = g.cedula;
            buscarControlSemanal();
        }
    }, 300);
}
