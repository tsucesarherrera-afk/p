<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sala de Rehabilitación Leoncio Páez</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fdf8f0 0%, #f9e9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(255, 250, 240, 0.95);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .main-header {
            background: linear-gradient(95deg, #b55b2c, #d8925e);
            padding: 1rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .logo-area p {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .user-welcome {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        button, .btn {
            background: #d88c54;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #b56230;
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid white;
            color: white;
        }
        .btn-outline:hover {
            background: white;
            color: #b56230;
        }
        .btn-danger {
            background: #c24a3a;
        }
        .btn-success {
            background: #2f8b5c;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 16px;
            border: 1px solid #e2cbb9;
            border-radius: 28px;
            background: #fffcf8;
        }
        input:focus {
            outline: none;
            border-color: #d88c54;
        }
        label {
            font-weight: 600;
            color: #6b3e1c;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #f0e0d0;
        }
        th {
            background: #f6ede4;
            color: #7b4a2a;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c6e3c;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1200;
        }
        .inactivity-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 32px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        @media (max-width: 768px) {
            .main-header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="main-header">
        <div class="logo-area">
            <h1><i class="fas fa-hand-holding-heart"></i> Rehabilitación Leoncio Páez</h1>
            <p>Centro de Medicina Física y Rehabilitación</p>
        </div>
        <div id="headerUserInfo" class="user-welcome"></div>
    </div>
    <div id="dynamicContent" style="padding: 2rem;">
        Cargando sistema...
    </div>
</div>

<script>
    // --------------------------------------------------------------
    //  CONFIGURACIÓN DE SUPABASE (REEMPLAZA CON TUS DATOS REALES)
    // --------------------------------------------------------------
    const SUPABASE_URL = 'https://zrdyhalokzcdartdlgrn.supabase.co';  
    const SUPABASE_ANON_KEY = 'sb_publishable_vIesD6EbjZa-Xj2-zeB42g_yi6YzYAX';                
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --------------------------------------------------------------
    //  VARIABLES GLOBALES
    // --------------------------------------------------------------
    let currentUser = null;        // { id, email, role, full_name }
    let inactivityTimeout = null;
    let warningTimeout = null;

    // Helper: mostrar notificación
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#b33' : '#2c6e3c';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Reiniciar temporizador de inactividad (10 min)
    function resetInactivityTimer() {
        if (inactivityTimeout) clearTimeout(inactivityTimeout);
        if (warningTimeout) clearTimeout(warningTimeout);
        if (!currentUser) return;
        inactivityTimeout = setTimeout(() => {
            showInactivityWarning();
        }, 9 * 60 * 1000); // 9 min muestra aviso
    }

    function showInactivityWarning() {
        if (document.getElementById('inactivityWarning')) return;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'inactivity-warning';
        modalDiv.id = 'inactivityWarning';
        modalDiv.innerHTML = `
            <i class="fas fa-hourglass-half" style="font-size: 48px; color:#d88c54;"></i>
            <h3>⚠️ Sesión a punto de expirar</h3>
            <p>Por inactividad, tu sesión se cerrará en 30 segundos.</p>
            <button id="continueSessionBtn" class="btn-success" style="margin-top: 20px;">Continuar sesión</button>
        `;
        document.body.appendChild(modalDiv);
        warningTimeout = setTimeout(() => {
            logout();
            hideWarningModal();
            showToast('Sesión cerrada por inactividad');
        }, 30000);
        document.getElementById('continueSessionBtn').onclick = () => {
            hideWarningModal();
            resetInactivityTimer();
            showToast('Sesión extendida');
        };
    }

    function hideWarningModal() {
        const warn = document.getElementById('inactivityWarning');
        if (warn) warn.remove();
        if (warningTimeout) clearTimeout(warningTimeout);
    }

    function attachGlobalEvents() {
        const events = ['mousemove', 'keydown', 'click', 'scroll'];
        events.forEach(ev => window.addEventListener(ev, () => {
            if (currentUser) resetInactivityTimer();
        }));
    }

    // Cerrar sesión con confirmación centrada
    function logout() {
        if (!currentUser) return;
        const confirmExit = confirm('¿Está seguro que desea cerrar sesión?');
        if (!confirmExit) return;
        currentUser = null;
        localStorage.removeItem('user_session');
        renderLogin();
        showToast('Sesión cerrada');
    }

    // --------------------------------------------------------------
    //  AUTENTICACIÓN (usando Supabase Auth)
    // --------------------------------------------------------------
    async function loginUser(email, password) {
        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw new Error(error.message);
            // Obtener perfil desde tabla profiles
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', data.user.id)
                .single();
            if (profileError) throw new Error('Perfil no encontrado');
            if (profile.locked) throw new Error('Cuenta bloqueada. Contacte al administrador.');
            
            currentUser = profile;
            localStorage.setItem('user_session', JSON.stringify({ id: currentUser.id, email: currentUser.email, role: currentUser.role }));
            resetInactivityTimer();
            attachGlobalEvents();
            renderDashboardByRole();
            showToast(`Bienvenido ${currentUser.full_name || currentUser.email}`);
        } catch (err) {
            showToast(err.message, true);
        }
    }

    // Registro de pacientes (solo ellos)
    async function registerPatient(patientData) {
        try {
            // Verificar cédula única
            const { data: existing } = await supabase
                .from('patients')
                .select('cedula')
                .eq('cedula', patientData.cedula)
                .single();
            if (existing) throw new Error('Cédula ya registrada');
            
            // Llamar a la Edge Function para crear usuario en auth y enviar clave
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: patientData.email,
                    role: 'patient',
                    full_name: `${patientData.first_name} ${patientData.last_name}`,
                    phone: patientData.phone,
                    patient_data: patientData
                })
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Error al crear usuario');
            showToast('Registro exitoso. Revisa tu correo para la clave de acceso.');
            renderLogin();
        } catch (err) {
            showToast(err.message, true);
        }
    }

    // --------------------------------------------------------------
    //  RENDERIZADO DE VISTAS
    // --------------------------------------------------------------
    function renderLogin() {
        const container = document.getElementById('dynamicContent');
        document.getElementById('headerUserInfo').innerHTML = '';
        container.innerHTML = `
            <div class="card" style="max-width: 480px; margin: 0 auto;">
                <h2><i class="fas fa-sign-in-alt"></i> Acceso al sistema</h2>
                <form id="loginForm">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" required placeholder="ejemplo@dominio.com">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required>
                    <button type="submit" style="width:100%"><i class="fas fa-key"></i> Ingresar</button>
                </form>
                <hr style="margin:20px 0">
                <p>¿Nuevo paciente? <button id="goToRegisterBtn" class="btn-outline" style="background:#c17b4c;">Registrarme aquí</button></p>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            loginUser(email, pass);
        });
        document.getElementById('goToRegisterBtn').onclick = () => renderRegister();
    }

    function renderRegister() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h2><i class="fas fa-user-plus"></i> Registro de paciente</h2>
                <form id="registerForm">
                    <div class="grid-2">
                        <div><label>Nombres *</label><input id="regNombre" required></div>
                        <div><label>Apellidos *</label><input id="regApellido" required></div>
                        <div><label>Cédula (única) *</label><input id="regCedula" required></div>
                        <div><label>Fecha nacimiento *</label><input type="date" id="regFechaNac" required></div>
                        <div><label>Celular *</label><input id="regCelular" required></div>
                        <div><label>Correo electrónico *</label><input type="email" id="regEmail" required></div>
                    </div>
                    <button type="submit" class="btn-success">Registrarse (enviar clave al correo)</button>
                    <button type="button" id="backLoginBtn" style="background:#aaa;">Volver al login</button>
                </form>
            </div>
        `;
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('regNombre').value;
            const lastName = document.getElementById('regApellido').value;
            const cedula = document.getElementById('regCedula').value;
            const birthDate = document.getElementById('regFechaNac').value;
            const phone = document.getElementById('regCelular').value;
            const email = document.getElementById('regEmail').value;
            if (!firstName || !lastName || !cedula || !birthDate || !phone || !email) {
                showToast('Complete todos los campos', true);
                return;
            }
            await registerPatient({
                first_name: firstName, last_name: lastName, cedula, birth_date: birthDate, phone, email
            });
        });
        document.getElementById('backLoginBtn').onclick = () => renderLogin();
    }

    async function renderDashboardByRole() {
        if (!currentUser) return renderLogin();
        document.getElementById('headerUserInfo').innerHTML = `
            <span><i class="fas fa-user-circle"></i> ${currentUser.full_name || currentUser.email} (${currentUser.role})</span>
            <button id="globalLogoutBtn" class="btn-outline" style="padding:4px 12px;"><i class="fas fa-sign-out-alt"></i> Cerrar</button>
        `;
        document.getElementById('globalLogoutBtn').onclick = () => logout();
        
        const container = document.getElementById('dynamicContent');
        const role = currentUser.role;
        if (role === 'super_admin') renderSuperAdminPanel(container);
        else if (role === 'admin') renderAdminPanel(container);
        else if (role === 'assistant') renderAssistantPanel(container);
        else if (role === 'physiatrist') renderPhysiatristPanel(container);
        else if (role === 'patient') renderPatientPanel(container);
        else renderLogin();
    }

    // --------------------------------------------------------------
    //  PANEL SUPER ADMIN (ejemplo funcional)
    // --------------------------------------------------------------
    async function renderSuperAdminPanel(container) {
        container.innerHTML = `
            <h2><i class="fas fa-crown"></i> Panel Super Administrador</h2>
            <div class="card">
                <button id="listUsersBtn"><i class="fas fa-users"></i> Listar usuarios</button>
                <button id="createUserBtn"><i class="fas fa-user-plus"></i> Crear usuario</button>
                <button id="manageHolidaysBtn"><i class="fas fa-calendar-times"></i> Gestionar feriados</button>
            </div>
            <div id="subContent"></div>
        `;
        document.getElementById('listUsersBtn').onclick = () => listAllUsers();
        document.getElementById('createUserBtn').onclick = () => showCreateUserModal();
        document.getElementById('manageHolidaysBtn').onclick = () => manageHolidays();
        await listAllUsers();
    }

    async function listAllUsers() {
        const sub = document.getElementById('subContent');
        const { data, error } = await supabase.from('profiles').select('id, email, role, full_name, locked');
        if (error) {
            sub.innerHTML = '<p>Error cargando usuarios</p>';
            return;
        }
        sub.innerHTML = `
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Email</th><th>Rol</th><th>Nombre</th><th>Bloqueado</th><th>Acciones</th></tr></thead>
                    <tbody>
                        ${data.map(u => `
                            <tr>
                                <td>${u.email}</td><td>${u.role}</td><td>${u.full_name || '-'}</td><td>${u.locked ? 'Sí' : 'No'}</td>
                                <td><button class="btn-sm" onclick="window.unlockUser('${u.id}')">Desbloquear</button>
                                <button onclick="window.deleteUser('${u.id}')">Eliminar</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        window.unlockUser = async (userId) => {
            await supabase.from('profiles').update({ locked: false, failed_attempts: 0 }).eq('id', userId);
            listAllUsers();
            showToast('Usuario desbloqueado');
        };
        window.deleteUser = async (userId) => {
            if (!confirm('Eliminar usuario también eliminará sus datos asociados?')) return;
            await supabase.rpc('delete_user_cascade', { user_id: userId });
            listAllUsers();
            showToast('Usuario eliminado');
        };
    }

    function showCreateUserModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.style.display = 'flex';
        modalDiv.innerHTML = `
            <div class="modal-content">
                <h3>Crear nuevo usuario</h3>
                <label>Email</label><input id="newEmail" type="email">
                <label>Rol</label>
                <select id="newRole">
                    <option value="admin">Administrador</option>
                    <option value="assistant">Asistente</option>
                    <option value="physiatrist">Fisiatra</option>
                </select>
                <label>Nombre completo</label><input id="newFullname">
                <button id="confirmCreateUser">Crear y enviar clave</button>
                <button id="closeModal">Cancelar</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('confirmCreateUser').onclick = async () => {
            const email = document.getElementById('newEmail').value;
            const role = document.getElementById('newRole').value;
            const fullname = document.getElementById('newFullname').value;
            if (!email) return showToast('Email requerido', true);
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, role, full_name: fullname, sendMail: true })
            });
            if (response.ok) showToast('Usuario creado, clave enviada al correo');
            else showToast('Error al crear usuario', true);
            modalDiv.remove();
            listAllUsers();
        };
        document.getElementById('closeModal').onclick = () => modalDiv.remove();
    }

    async function manageHolidays() {
        const sub = document.getElementById('subContent');
        const { data: holidays, error } = await supabase.from('holidays').select('*').order('holiday_date', { ascending: true });
        if (error) return;
        sub.innerHTML = `
            <div class="card">
                <h3>Días feriados (Venezuela)</h3>
                <button id="addHolidayBtn">+ Agregar feriado</button>
                <ul id="holidayList">
                    ${holidays.map(h => `<li>${h.holiday_date} - ${h.description} <button onclick="deleteHoliday(${h.id})">Eliminar</button></li>`).join('')}
                </ul>
            </div>
        `;
        document.getElementById('addHolidayBtn').onclick = () => {
            const date = prompt('Fecha (YYYY-MM-DD):');
            const desc = prompt('Descripción:');
            if (date && desc) supabase.from('holidays').insert({ holiday_date: date, description: desc }).then(() => manageHolidays());
        };
        window.deleteHoliday = async (id) => {
            await supabase.from('holidays').delete().eq('id', id);
            manageHolidays();
        };
    }

    // --------------------------------------------------------------
    //  PANEL ADMIN (simplificado pero funcional)
    // --------------------------------------------------------------
    function renderAdminPanel(container) {
        container.innerHTML = `
            <h2>Panel Administrador</h2>
            <div class="card">
                <button id="managePatientsBtn"><i class="fas fa-users"></i> Gestionar pacientes</button>
                <button id="manageAppointmentsBtn"><i class="fas fa-calendar-check"></i> Gestionar citas</button>
                <button id="verifyAttendanceBtn"><i class="fas fa-clipboard-list"></i> Verificar asistencia</button>
            </div>
            <div id="adminSub"></div>
        `;
        document.getElementById('managePatientsBtn').onclick = () => showPatientsList();
        document.getElementById('manageAppointmentsBtn').onclick = () => showAppointmentsList();
        document.getElementById('verifyAttendanceBtn').onclick = () => showAttendanceVerification();
        showPatientsList(); // vista por defecto
    }

    async function showPatientsList() {
        const sub = document.getElementById('adminSub');
        const { data, error } = await supabase.from('patients').select('*');
        if (error) return;
        sub.innerHTML = `<div class="table-responsive"><table><tr><th>Cédula</th><th>Nombre</th><th>Email</th><th>Celular</th><th>Acciones</th></tr>
            ${data.map(p => `<tr>
                <td>${p.cedula}</td><td>${p.first_name} ${p.last_name}</td><td>${p.email}</td><td>${p.phone}</td>
                <td><button onclick="editPatient('${p.id}')">Editar</button> <button onclick="deletePatient('${p.id}')">Eliminar</button></td>
            </tr>`).join('')}
        </table></div><button id="newPatientBtn">+ Nuevo paciente</button>`;
        document.getElementById('newPatientBtn').onclick = () => createPatientModal();
        window.editPatient = (id) => editPatientModal(id);
        window.deletePatient = async (id) => {
            if (confirm('¿Eliminar paciente? También sus citas e historias')) {
                await supabase.from('patients').delete().eq('id', id);
                showPatientsList();
            }
        };
    }

    async function showAppointmentsList() {
        const sub = document.getElementById('adminSub');
        const { data, error } = await supabase.from('appointments').select('*, patients(first_name, last_name)');
        if (error) return;
        sub.innerHTML = `<div class="table-responsive"><table><tr><th>Paciente</th><th>Fecha</th><th>Estado</th><th>Asistió</th><th>Acciones</th></tr>
            ${data.map(a => `<tr>
                <td>${a.patients?.first_name} ${a.patients?.last_name}</td>
                <td>${a.appointment_date}</td><td>${a.status}</td><td>${a.attended ? 'Sí' : 'No'}</td>
                <td><button onclick="cancelAppointment('${a.id}')">Cancelar</button> <button onclick="reprogramAppointment('${a.id}')">Reprogramar</button></td>
            </tr>`).join('')}
        </table></div><button id="newAppointmentBtn">+ Nueva cita</button>`;
        document.getElementById('newAppointmentBtn').onclick = () => createAppointmentModal();
        window.cancelAppointment = async (id) => {
            await supabase.from('appointments').update({ status: 'cancelled' }).eq('id', id);
            showAppointmentsList();
        };
        window.reprogramAppointment = async (id) => {
            const newDate = prompt('Nueva fecha (YYYY-MM-DD):');
            if (newDate) await supabase.from('appointments').update({ appointment_date: newDate, status: 'reprogrammed' }).eq('id', id);
            showAppointmentsList();
        };
    }

    async function showAttendanceVerification() {
        const sub = document.getElementById('adminSub');
        const { data, error } = await supabase.from('appointments').select('*, patients(first_name, last_name)').eq('status', 'scheduled');
        sub.innerHTML = `<h3>Verificar asistencia</h3><div class="table-responsive"><table><tr><th>Paciente</th><th>Fecha</th><th>Asistió</th><th></th></tr>
            ${data.map(a => `<tr>
                <td>${a.patients?.first_name} ${a.patients?.last_name}</td><td>${a.appointment_date}</td>
                <td><input type="checkbox" id="attend_${a.id}" ${a.attended ? 'checked' : ''}></td>
                <td><button onclick="markAttendance('${a.id}')">Guardar</button></td>
            </tr>`).join('')}
        </table></div>`;
        window.markAttendance = async (id) => {
            const attended = document.getElementById(`attend_${id}`).checked;
            await supabase.from('appointments').update({ attended, status: attended ? 'attended' : 'scheduled' }).eq('id', id);
            showAttendanceVerification();
        };
    }

    // --------------------------------------------------------------
    //  PANEL ASISTENTE
    // --------------------------------------------------------------
    function renderAssistantPanel(container) {
        container.innerHTML = `
            <h2>Panel Asistente</h2>
            <div class="card">

    // --------------------------------------------------------------
    //  PANEL PACIENTE
    // --------------------------------------------------------------
    function renderPatientPanel(container) {
        container.innerHTML = `
            <h2>Mi área de paciente</h2>
            <div class="card">
                <button id="requestCitaBtn">Solicitar nueva cita</button>
                <button id="myHistoryBtn">Ver mi historia médica</button>
                <button id="myDataBtn">Mis datos personales</button>
            </div>
            <div id="patientSub"></div>
        `;
        document.getElementById('requestCitaBtn').onclick = () => requestAppointment();
        document.getElementById('myHistoryBtn').onclick = () => viewMyMedicalHistory();
        document.getElementById('myDataBtn').onclick = () => viewMyData();
        requestAppointment(); // vista por defecto
    }
    async function requestAppointment() {
        const sub = document.getElementById('patientSub');
        sub.innerHTML = `<div class="card"><h3>Solicitar cita</h3><input type="date" id="appDate"><button id="submitRequest">Solicitar</button></div>`;
        document.getElementById('submitRequest').onclick = async () => {
            const date = document.getElementById('appDate').value;
            if (!date) return;
            const { error } = await supabase.from('appointments').insert({
                patient_id: currentUser.id,
                appointment_date: date,
                status: 'scheduled',
                created_by: currentUser.id
            });
            if (error) showToast(error.message, true);
            else showToast('Cita solicitada, espere confirmación');
        };
    }
    async function viewMyMedicalHistory() { /* mostrar medical_records del paciente */ }
    async function viewMyData() { /* mostrar perfil y permitir modificación */ }

    // --------------------------------------------------------------
    //  INICIALIZACIÓN
    // --------------------------------------------------------------
    (async function init() {
        const stored = localStorage.getItem('user_session');
        if (stored) {
            try {
                const { id } = JSON.parse(stored);
                const { data: profile, error } = await supabase.from('profiles').select('*').eq('id', id).single();
                if (profile && !error) {
                    currentUser = profile;
                    renderDashboardByRole();
                    resetInactivityTimer();
                    attachGlobalEvents();
                    return;
                }
            } catch(e) {}
        }
        renderLogin();
        attachGlobalEvents();
    })();
</script>
