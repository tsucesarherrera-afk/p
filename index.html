<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sala de Rehabilitación Leoncio Páez</title>
    <!-- Fuentes y estilos base -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fdf8f0 0%, #f9e9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal */
        .app-container {
            width: 100%;
            max-width: 1400px;
            background: rgba(255, 250, 240, 0.95);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 2px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.3s;
        }

        /* Header con logo y título */
        .main-header {
            background: #c17b4c;
            background: linear-gradient(95deg, #b55b2c, #d8925e);
            padding: 1rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo-area h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .user-welcome {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Botones y cards */
        button, .btn {
            background: #d88c54;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover, .btn:hover {
            background: #b56230;
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .btn-outline:hover {
            background: white;
            color: #b56230;
        }

        .btn-danger {
            background: #c24a3a;
        }
        .btn-success {
            background: #2f8b5c;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        /* Formularios */
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 16px;
            border: 1px solid #e2cbb9;
            border-radius: 28px;
            background: #fffcf8;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #d88c54;
            box-shadow: 0 0 0 3px rgba(216,140,84,0.2);
        }

        label {
            font-weight: 600;
            color: #6b3e1c;
            font-size: 0.85rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* tablas */
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #f0e0d0;
        }
        th {
            background: #f6ede4;
            color: #7b4a2a;
        }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
        }

        /* alertas */
        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c3e2f;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1200;
        }

        .inactivity-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 32px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        @media (max-width: 768px) {
            .main-header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="main-header">
        <div class="logo-area">
            <h1><i class="fas fa-hand-holding-heart"></i> Rehabilitación Leoncio Páez</h1>
            <p>Centro de Medicina Física y Rehabilitación</p>
        </div>
        <div id="headerUserInfo" class="user-welcome">
            <!-- se llena dinámicamente -->
        </div>
    </div>
    <div id="dynamicContent" style="padding: 2rem;">
        <!-- Aquí se renderiza login, registro o dashboard -->
        Cargando sistema...
    </div>
</div>

<script>
    // ---------- CONFIGURACIÓN SUPABASE ----------
    // Reemplaza con tus credenciales reales (URL y anon key de Supabase)
    const SUPABASE_URL = 'https://zrdyhalokzcdartdlgrn.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_vIesD6EbjZa-Xj2-zeB42g_yi6YzYAX';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Variables globales de sesión
    let currentUser = null;      // { id, email, role, full_name, ... }
    let sessionTimer = null;
    let inactivityTimeout = null;
    let warningTimer = null;
    let warningModalActive = false;

    // Helper: mostrar notificación
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#b33' : '#2c6e3c';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Calcular edad desde fecha nacimiento
    function calcularEdad(fechaNac) {
        if (!fechaNac) return '';
        const hoy = new Date();
        const nac = new Date(fechaNac);
        let edad = hoy.getFullYear() - nac.getFullYear();
        const m = hoy.getMonth() - nac.getMonth();
        if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
        return edad;
    }

    // --- CONTROL DE INACTIVIDAD (10 min) ---
    function resetInactivityTimer() {
        if (warningTimer) clearTimeout(warningTimer);
        if (inactivityTimeout) clearTimeout(inactivityTimeout);
        if (warningModalActive) hideWarningModal();
        if (!currentUser) return;
        inactivityTimeout = setTimeout(() => {
            showInactivityWarning();
        }, 9 * 60 * 1000); // 9 minutos muestra aviso
    }

    function showInactivityWarning() {
        if (warningModalActive || !currentUser) return;
        warningModalActive = true;
        const modalDiv = document.createElement('div');
        modalDiv.className = 'inactivity-warning';
        modalDiv.id = 'inactivityWarning';
        modalDiv.innerHTML = `
            <i class="fas fa-hourglass-half" style="font-size: 48px; color:#d88c54;"></i>
            <h3>⚠️ Sesión a punto de expirar</h3>
            <p>Por inactividad, tu sesión se cerrará en 30 segundos.</p>
            <button id="continueSessionBtn" class="btn-success" style="margin-top: 20px;"><i class="fas fa-clock"></i> Continuar sesión</button>
        `;
        document.body.appendChild(modalDiv);
        warningTimer = setTimeout(() => {
            logout();
            hideWarningModal();
            showToast('Sesión cerrada por inactividad');
        }, 30000);
        document.getElementById('continueSessionBtn').onclick = () => {
            hideWarningModal();
            resetInactivityTimer();
            showToast('Sesión extendida');
        };
    }

    function hideWarningModal() {
        const warn = document.getElementById('inactivityWarning');
        if (warn) warn.remove();
        if (warningTimer) clearTimeout(warningTimer);
        warningModalActive = false;
    }

    function attachGlobalEvents() {
        const events = ['mousemove', 'keydown', 'click', 'scroll'];
        events.forEach(ev => window.addEventListener(ev, () => {
            if (currentUser) resetInactivityTimer();
        }));
    }

    // Cerrar sesión con confirmación centrada
    function logout() {
        if (!currentUser) return;
        const confirmExit = confirm('¿Está seguro que desea cerrar sesión?');
        if (!confirmExit) return;
        if (sessionTimer) clearInterval(sessionTimer);
        if (inactivityTimeout) clearTimeout(inactivityTimeout);
        currentUser = null;
        localStorage.removeItem('user_session');
        renderLogin();
        showToast('Sesión cerrada');
    }

    // -- Funciones de autenticación personalizada (verifica intentos bloqueo) --
    async function loginUser(email, password) {
        try {
            // Llamada a función RPC para login seguro (verifica intentos y devuelve token)
            // Usamos un enfoque directo: primero consultamos si usuario está bloqueado y luego auth
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('id, email, role, full_name, locked, failed_attempts')
                .eq('email', email)
                .single();
            if (profileError || !profile) throw new Error('Usuario no existe');
            if (profile.locked) throw new Error('Cuenta bloqueada. Contacte al administrador.');

            // intentamos autenticar con Supabase Auth (los usuarios están en auth.users)
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                // incrementar intentos fallidos
                await supabase.rpc('increment_failed_attempts', { user_email: email });
                const { data: newProfile } = await supabase.from('profiles').select('failed_attempts').eq('email', email).single();
                if (newProfile && newProfile.failed_attempts >= 3) {
                    await supabase.from('profiles').update({ locked: true }).eq('email', email);
                    throw new Error('Has alcanzado 3 intentos fallidos. Cuenta bloqueada.');
                }
                throw new Error('Credenciales incorrectas');
            }
            // resetear intentos al login exitoso
            await supabase.from('profiles').update({ failed_attempts: 0, locked: false }).eq('email', email);
            const { data: finalProfile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
            currentUser = { ...finalProfile, email: finalProfile.email };
            localStorage.setItem('user_session', JSON.stringify({ id: currentUser.id, email: currentUser.email, role: currentUser.role }));
            resetInactivityTimer();
            attachGlobalEvents();
            renderDashboardByRole();
            showToast(`Bienvenido ${currentUser.full_name || currentUser.email}`);
        } catch (err) {
            showToast(err.message, true);
        }
    }

    // Registro de pacientes (solo ellos pueden auto-registrarse)
    async function registerPatient(dataReg) {
        try {
            // Validar cedula única
            const { data: cedulaExists } = await supabase.from('patients').select('cedula').eq('cedula', dataReg.cedula).single();
            if (cedulaExists) throw new Error('Cédula ya registrada');
            // Llamar a edge function que crea usuario en auth, genera password y envía correo
            const response = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: dataReg.email,
                    password: null, // se genera automático
                    role: 'patient',
                    full_name: `${dataReg.first_name} ${dataReg.last_name}`,
                    phone: dataReg.phone,
                    patient_data: {
                        cedula: dataReg.cedula,
                        first_name: dataReg.first_name,
                        last_name: dataReg.last_name,
                        birth_date: dataReg.birth_date,
                        phone: dataReg.phone,
                        email: dataReg.email
                    }
                })
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error || 'Error al crear usuario');
            showToast('Registro exitoso. Revisa tu correo para la clave de acceso.');
            renderLogin();
        } catch (err) {
            showToast(err.message, true);
        }
    }

    // Renderizadores principales
    function renderLogin() {
        const container = document.getElementById('dynamicContent');
        document.getElementById('headerUserInfo').innerHTML = '';
        container.innerHTML = `
            <div class="card" style="max-width: 480px; margin: 0 auto;">
                <h2><i class="fas fa-sign-in-alt"></i> Acceso al sistema</h2>
                <form id="loginForm">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" required placeholder="ejemplo@dominio.com">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required>
                    <button type="submit" style="width:100%"><i class="fas fa-key"></i> Ingresar</button>
                </form>
                <hr style="margin:20px 0">
                <p>¿Nuevo paciente? <button id="goToRegisterBtn" class="btn-outline" style="background:#c17b4c;">Registrarme aquí</button></p>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            loginUser(email, pass);
        });
        document.getElementById('goToRegisterBtn').onclick = () => renderRegister();
    }

    function renderRegister() {
        const container = document.getElementById('dynamicContent');
        container.innerHTML = `
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h2><i class="fas fa-user-plus"></i> Registro de paciente</h2>
                <form id="registerForm">
                    <div class="grid-2">
                        <div><label>Nombres *</label><input id="regNombre" required></div>
                        <div><label>Apellidos *</label><input id="regApellido" required></div>
                        <div><label>Cédula (única) *</label><input id="regCedula" required></div>
                        <div><label>Fecha nacimiento *</label><input type="date" id="regFechaNac" required></div>
                        <div><label>Celular *</label><input id="regCelular" required></div>
                        <div><label>Correo electrónico *</label><input type="email" id="regEmail" required></div>
                    </div>
                    <button type="submit" class="btn-success">Registrarse (enviar clave al correo)</button>
                    <button type="button" id="backLoginBtn" style="background:#aaa;">Volver al login</button>
                </form>
            </div>
        `;
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('regNombre').value;
            const lastName = document.getElementById('regApellido').value;
            const cedula = document.getElementById('regCedula').value;
            const birthDate = document.getElementById('regFechaNac').value;
            const phone = document.getElementById('regCelular').value;
            const email = document.getElementById('regEmail').value;
            if (!firstName || !lastName || !cedula || !birthDate || !phone || !email) {
                showToast('Complete todos los campos', true);
                return;
            }
            await registerPatient({
                first_name: firstName, last_name: lastName, cedula, birth_date: birthDate, phone, email
            });
        });
        document.getElementById('backLoginBtn').onclick = () => renderLogin();
    }

    async function renderDashboardByRole() {
        if (!currentUser) return renderLogin();
        document.getElementById('headerUserInfo').innerHTML = `
            <span><i class="fas fa-user-circle"></i> ${currentUser.full_name || currentUser.email} (${currentUser.role})</span>
            <button id="globalLogoutBtn" class="btn-outline" style="padding:4px 12px;"><i class="fas fa-sign-out-alt"></i> Cerrar</button>
        `;
        document.getElementById('globalLogoutBtn').onclick = () => logout();

        const container = document.getElementById('dynamicContent');
        const role = currentUser.role;
        if (role === 'super_admin') renderSuperAdminPanel(container);
        else if (role === 'admin') renderAdminPanel(container);
        else if (role === 'assistant') renderAssistantPanel(container);
        else if (role === 'physiatrist') renderPhysiatristPanel(container);
        else if (role === 'patient') renderPatientPanel(container);
        else renderLogin();
    }

    // ========== PANEL SUPER ADMIN ==========
    async function renderSuperAdminPanel(container) {
        container.innerHTML = `<h2><i class="fas fa-crown"></i> Panel Super Administrador</h2>
            <div class="card"><button id="createUserBtn"><i class="fas fa-user-plus"></i> Crear nuevo usuario (admin, asistente, fisiatra)</button>
            <button id="manageAllUsersBtn">Gestionar usuarios</button> <button id="manageHolidaysBtn">Gestionar días feriados</button></div>
            <div id="subContent"></div>`;
        document.getElementById('createUserBtn').onclick = () => showCreateUserModal();
        document.getElementById('manageAllUsersBtn').onclick = () => listAllUsers();
        document.getElementById('manageHolidaysBtn').onclick = () => manageHolidays();
        await listAllUsers();
    }

    async function listAllUsers() {
        const sub = document.getElementById('subContent');
        const { data, error } = await supabase.from('profiles').select('id, email, role, full_name, locked');
        if (error) return showToast('Error cargando usuarios');
        sub.innerHTML = `<div class="table-responsive"><table><tr><th>Email</th><th>Rol</th><th>Nombre</th><th>Bloqueado</th><th>Acciones</th></tr>
            ${data.map(u => `<tr><td>${u.email}</td><td>${u.role}</td><td>${u.full_name || '-'}</td><td>${u.locked ? 'Sí' : 'No'}</td>
            <td><button class="btn-sm" onclick="unlockUser('${u.id}')">Desbloquear</button> <button onclick="deleteUserAccount('${u.id}')">Eliminar</button></td></tr>`).join('')}
            </table></div>`;
        window.unlockUser = async (userId) => {
            await supabase.from('profiles').update({ locked: false, failed_attempts: 0 }).eq('id', userId);
            listAllUsers();
            showToast('Usuario desbloqueado');
        };
        window.deleteUserAccount = async (userId) => {
            if(!confirm('Eliminar usuario también eliminará sus datos asociados?')) return;
            await supabase.rpc('delete_user_cascade', { user_id: userId });
            listAllUsers();
        };
    }

    function showCreateUserModal() {
        const modalHtml = `<div id="userModal" class="modal" style="display:flex"><div class="modal-content"><h3>Crear usuario</h3>
            <label>Email</label><input id="newEmail" type="email"><label>Rol</label><select id="newRole"><option>admin</option><option>assistant</option><option>physiatrist</option></select>
            <label>Nombre completo</label><input id="newFullname"><button id="confirmCreateUser">Crear y enviar clave</button><button id="closeModal">Cancelar</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('confirmCreateUser').onclick = async () => {
            const email = document.getElementById('newEmail').value;
            const role = document.getElementById('newRole').value;
            const fullname = document.getElementById('newFullname').value;
            const resp = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, role, full_name: fullname, sendMail: true })
            });
            if(resp.ok) showToast('Usuario creado, clave enviada al correo');
            else showToast('Error', true);
            document.getElementById('userModal').remove();
            listAllUsers();
        };
        document.getElementById('closeModal').onclick = () => document.getElementById('userModal').remove();
    }

    // restricción de fechas para citas (10 pacientes/día, excluir fines y feriados)
    async function getAvailableDates() { /* frontend validación */
    }

    // función simplificada para otros paneles, por brevedad implemento ejemplo completo pero limitaré a estructura clave
    function renderAdminPanel(container) { container.innerHTML = `<div class="card"><h3>Panel Administrador</h3><p>Gestión de pacientes, citas y asistencia.</p><button id="manageAppointmentsBtn">Gestionar Citas</button><button id="managePatientsBtn">Pacientes</button><div id="adminSub"></div></div>`; }
    function renderAssistantPanel(container) { container.innerHTML = `<div><h3>Asistente</h3><button id="assistCitas">Citas / Reprogramar</button><button id="assistPacientes">Pacientes</button></div>`; }
    function renderPhysiatristPanel(container) { container.innerHTML = `<div><h3>Fisiatra</h3><button id="medHistBtn">Historias médicas</button><button id="newCitaFisiatra">Asignar cita</button></div>`; }
    function renderPatientPanel(container) {
        container.innerHTML = `<div><h3>Mis datos y citas</h3><button id="requestCitaBtn">Solicitar nueva cita</button><button id="myHistoryBtn">Ver mi historia</button><div id="patientInfo"></div></div>`;
        document.getElementById('requestCitaBtn').onclick = () => showSolicitarCita();
        loadPatientData();
    }

    async function loadPatientData() { /* obtener datos del paciente */ }
    async function showSolicitarCita() { /* implementar validacion de limite de 10 por día, feriados */ }
    
    // Inicializar sistema
    async function init() {
        const session = localStorage.getItem('user_session');
        if (session) {
            try {
                const { id } = JSON.parse(session);
                const { data: prof } = await supabase.from('profiles').select('*').eq('id', id).single();
                if (prof) {
                    currentUser = prof;
                    renderDashboardByRole();
                    resetInactivityTimer();
                    attachGlobalEvents();
                    return;
                }
            } catch(e) {}
        }
        renderLogin();
        attachGlobalEvents();
    }
    init();
</script>
</body>
</html>
