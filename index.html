// ============================================================

// Configuración por año: [año, fecha_inicio_semana_1 (YYYY-MM-DD)]
const CALENDARIOS_EPI = {
    2025: { inicio: '2024-12-29', fin: '2026-01-03' },  // SE 1 2025 = 29 dic 2024
    2026: { inicio: '2026-01-04', fin: '2027-01-02' },  // SE 1 2026 = 4 ene 2026
    2027: { inicio: '2027-01-03', fin: '2028-01-01' },  // SE 1 2027 = 3 ene 2027
};

// Semana epidemiológica manual (si el usuario la configura)
let semanaEpidemiologicaManual = null;
let anioEpidemiologicoManual = null;

function getSemanaEpidemiologica() {
    // Si hay configuración manual, usarla
    if (semanaEpidemiologicaManual !== null) {
        return parseInt(semanaEpidemiologicaManual);
    }

    const now = new Date();
    const anio = now.getFullYear();

    // Buscar el calendario del año actual
    const cal = CALENDARIOS_EPI[anio];
    if (!cal) {
        // Fallback al cálculo simple pero CORREGIDO

    }

    const inicio = new Date(cal.inicio + 'T00:00:00');
    const fin = new Date(cal.fin + 'T00:00:00');

    // Si estamos antes del inicio del año epidemiológico, usar año anterior
    if (now < inicio) {
        const calAnterior = CALENDARIOS_EPI[anio - 1];
        if (calAnterior) {
            const inicioAnt = new Date(calAnterior.inicio + 'T00:00:00');
            const dias = Math.floor((now - inicioAnt) / (1000 * 60 * 60 * 24));
            return Math.floor(dias / 7) + 1;

    }

    // Si estamos después del fin, usar año siguiente
    if (now > fin) {
        const calSiguiente = CALENDARIOS_EPI[anio + 1];
        if (calSiguiente) {
            const inicioSig = new Date(calSiguiente.inicio + 'T00:00:00');
            const dias = Math.floor((now - inicioSig) / (1000 * 60 * 60 * 24));
            return Math.floor(dias / 7) + 1;
        }
    }

    // Cálculo normal
    const dias = Math.floor((now - inicio) / (1000 * 60 * 60 * 24));
    return Math.floor(dias / 7) + 1;
}

function calcularSemanaEpidemiologicaCorregida(fecha) {
    // Método corregido: buscar el primer domingo del año o el 1 de enero si es domingo
    const anio = fecha.getFullYear();
    const primerEnero = new Date(anio, 0, 1);
    const diaSemana = primerEnero.getDay(); // 0=domingo, 1=lunes, ..., 6=sábado

    // Encontrar el inicio de la semana epidemiológica 1
    // Si 1 de enero es domingo, empieza el 1 de enero
    // Si no, retroceder al domingo anterior
    let inicioSE1;
    if (diaSemana === 0) {
        inicioSE1 = primerEnero;
    } else {
        inicioSE1 = new Date(anio, 0, 1 - diaSemana);
    }

    const dias = Math.floor((fecha - inicioSE1) / (1000 * 60 * 60 * 24));
    return Math.floor(dias / 7) + 1;
}

function getAnioEpidemiologico() {
    if (anioEpidemiologicoManual !== null) {
        return parseInt(anioEpidemiologicoManual);
    }
    return new Date().getFullYear();
}

function getAnio() { return new Date().getFullYear(); }

function $(id) { return document.getElementById(id); }

function hide(el) { if(typeof el === 'string') $(el).classList.add('hidden'); else el.classList.add('hidden'); }
function formatDate(date) { return date ? new Date(date).toLocaleDateString('es-VE') : '-'; }
function calcularSemanas(fur) {
    if(!fur) return 0;
    const hoy = new Date();
    const furDate = new Date(fur);
    const diffDays = Math.floor((hoy - furDate) / (1000 * 60 * 60 * 24));
    return Math.floor(diffDays / 7);
}
function calcularFPP(fur) {
    if(!fur) return null;
    const fpp = new Date(fur);
    fpp.setDate(fpp.getDate() + 280);
    return fpp;
}

    alert.className = `alert alert-${type}`;
    alert.innerHTML = `<span>${message}</span>`;
    alert.style.marginBottom = '10px';
    container.appendChild(alert);
    setTimeout(() => alert.remove(), 5000);
}

async function initAuth() {
    if (!supabase) {
        showLogin();
        setTimeout(() => {
            const err = $('loginError');
            if(err) { err.textContent = 'Error: No se pudo conectar con Supabase. Verifique su conexión.'; err.classList.remove('hidden'); }
        }, 100);
        return;
    }
    try {
        const { data: { session }, error } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            await loadUserProfile();
            if (currentProfile) {
                showApp();
            } else {
                // Si no se pudo cargar el perfil, mostrar error
                showLogin();
                setTimeout(() => {
                    const err = $('loginError');
                    if(err) { 
                        err.textContent = 'Error: No se pudo cargar su perfil de usuario. Contacte al administrador.'; 
                        err.classList.remove('hidden'); 
                    }
                }, 100);
            }
        } else {
            showLogin();
        }
    } catch(e) {
        console.error('Error checking session:', e);
        showLogin();
    }
    supabase.auth.onAuthStateChange((event, session) => {
        if(event === 'SIGNED_IN' && session) {
            currentUser = session.user;
            loadUserProfile().then(() => {
                if (currentProfile) showApp();
            });
        } else if(event === 'SIGNED_OUT') {
            currentUser = null; currentProfile = null; 
            semanaEpidemiologicaManual = null;
            anioEpidemiologicoManual = null;
            showLogin();
            showAlert('Sesión cerrada correctamente', 'info');
        }
    });
}

async function login() {
    if (!supabase) { showAlert('Supabase no disponible', 'danger'); return; }
    const email = $('loginEmail').value.trim();
    const password = $('loginPassword').value;
    const btn = $('loginBtn');
    const errorDiv = $('loginError');

    if(!email || !password) {
        errorDiv.textContent = 'Por favor ingrese usuario y contraseña';
        errorDiv.classList.remove('hidden');
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:8px;"></span> Ingresando...';
    errorDiv.classList.add('hidden');

    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
        currentUser = data.user;
        await loadUserProfile();
        if (currentProfile) {
            showApp();
            showAlert('¡Bienvenido al Sistema Ruta Materna!', 'success');
        } else {
            throw new Error('No se pudo cargar el perfil de usuario');
        }
    } catch(error) {
        errorDiv.textContent = error.message === 'Invalid login credentials' 
            ? 'Usuario o contraseña incorrectos' 
            : 'Error al iniciar sesión: ' + error.message;
        errorDiv.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>🔐</span> Ingresar al Sistema';
    }
}

async function loadUserProfile() {
    if(!currentUser || !supabase) return;
    try {
        const { data, error } = await supabase
            .from('perfiles_usuarios')
            .select('*, consultorios(*)')
            .eq('id', currentUser.id)
            .single();
        if(error) {
            // CORREGIDO: No asumir rol por defecto. Reportar el error.
            console.error('Error cargando perfil:', error);
            currentProfile = null;
            showAlert('Error al cargar perfil: ' + error.message + '. Verifique que la tabla perfiles_usuarios existe y tiene su registro.', 'danger');
        } else {
            currentProfile = data;
        }
    } catch(e) {
        console.error('Exception cargando perfil:', e);
        currentProfile = null;
        showAlert('Error crítico al cargar perfil. Contacte al administrador.', 'danger');
    }
}

async function logout() {
    if (!supabase) return;
    try { 
        await supabase.auth.signOut(); 
        currentUser = null; 
        currentProfile = null; 
        semanaEpidemiologicaManual = null;
        anioEpidemiologicoManual = null;
        showLogin(); 
    }
    catch(e) { console.error('Error logout:', e); }
}

    $('pageTitle').textContent = titles[section] || section;

            <tr><td>${formatDate(r.fecha_registro)}</td><td>${r.gestantes?.nombres || ''} ${r.gestantes?.apellidos || ''}</td><td>${r.gestantes?.cedula || '-'}</td>
            <td><span class="badge badge-${r.tipo_registro}">${r.tipo_registro}</span></td><td>${r.consultorios?.nombre || '-'}</td><td>SE ${r.semana_epidemiologica}</td>
            <td>${r.edad_gestacional_actual || '-'} sem</td>
            <td><button class="btn btn-sm btn-info" onclick="verRegistro('${r.id}')">👁️</button><button class="btn btn-sm btn-primary" onclick="editarRegistro('${r.id}')">✏️</button></td></tr>
        `).join('');
    } catch(e) { console.error('Error loading records:', e); }
}

function openModal(type, id = null) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay active';
    overlay.id = 'modalOverlay';
    let content = '';
    if(type === 'gestante') content = renderGestanteModal(id);
    else if(type === 'registro') content = renderRegistroModal(id);
    else if(type === 'usuario') content = renderUsuarioModal(id);
    overlay.innerHTML = `<div class="modal">${content}</div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });
}

function closeModal() { const overlay = $('modalOverlay'); if(overlay) overlay.remove(); }

}

async function guardarGestante() {
    if (!supabase) { showAlert('Error: Supabase no disponible', 'danger'); return; }
    const id = $('gestanteId').value;
    const data = {
        cedula: $('gCedula').value, nombres: $('gNombres').value, apellidos: $('gApellidos').value,
        fecha_nacimiento: $('gFechaNac').value || null, edad: parseInt($('gEdad').value) || null,
        telefono: $('gTelefono').value, telefono_familiar: $('gTelFamiliar').value,
        direccion: $('gDireccion').value, estado: $('gEstado').value,
        fur: $('gFUR').value || null, fpp: $('gFPP').value || null,
        num_gestas: parseInt($('gNumGestas').value) || 0, num_partos: parseInt($('gNumPartos').value) || 0,
        num_cesareas: parseInt($('gNumCesareas').value) || 0, num_abortos: parseInt($('gNumAbortos').value) || 0,
        estado_actual: $('gEstadoActual').value, en_control_prenatal: $('gEnControl').value === 'true',
        tipo_establecimiento: $('gTipoEstablecimiento').value || null,
        posee_carnet_patria: $('gCarnetPatria').value === 'true',
        recibe_micronutrientes: $('gMicronutrientes').value === 'true',
        tiene_enfermedad_asociada: $('gTieneEnfermedad').value === 'true',
        enfermedad_cual: $('gEnfermedadCual').value,
        inscrita_parto_humanizado: $('gPartoHumanizado').value === 'true',
        antecedentes_importantes: $('gAntecedentes').value
    };
    try {
        let result;
        if(id) { result = await supabase.from('gestantes').update(data).eq('id', id); }
        else { data.created_by = currentUser.id; result = await supabase.from('gestantes').insert([data]); }
        if(result.error) throw result.error;
        showAlert('Gestante guardada correctamente', 'success');
        closeModal();
        if(currentSection === 'gestantes') loadGestantes(); else loadDashboardData();
    } catch(e) { showAlert('Error al guardar: ' + e.message, 'danger'); }
}

async function buscarGestanteParaRegistro() {
    if (!supabase) return;
    const query = $('rBuscarCedula').value.trim();
    const resultados = $('rResultadosBusqueda');
    if(query.length < 3) { resultados.classList.add('hidden'); return; }
    try {
        const { data } = await supabase.from('gestantes').select('id, cedula, nombres, apellidos, fur').ilike('cedula', `%${query}%`).limit(5);
        if(!data?.length) resultados.innerHTML = '<div class="search-result-item">No se encontraron resultados</div>';
        else resultados.innerHTML = data.map(g => `
            <div class="search-result-item" onclick="seleccionarGestante('${g.id}', '${g.cedula}', '${g.nombres} ${g.apellidos}', '${g.fur || ''}')">
                <div class="result-name">${g.nombres} ${g.apellidos}</div>
                <div class="result-details">Cédula: ${g.cedula} | FUR: ${g.fur ? formatDate(g.fur) : 'No registrada'}</div>
            </div>`).join('');
        resultados.classList.remove('hidden');
    } catch(e) { console.error('Error searching:', e); }
}

function seleccionarGestante(id, cedula, nombre, fur) {
    $('rGestanteId').value = id; $('rBuscarCedula').value = cedula;
    $('rNombreGestante').textContent = nombre; $('rCedulaGestante').textContent = 'Cédula: ' + cedula;
    const semanas = fur ? calcularSemanas(fur) : '-';
    $('rSemanasGestante').textContent = 'Semanas: ' + semanas;
    $('rEdadGestacional').value = semanas !== '-' ? semanas : '';
    $('rInfoGestante').style.display = 'block'; $('rResultadosBusqueda').classList.add('hidden');
}

async function guardarRegistro() {
    if (!supabase) { showAlert('Error: Supabase no disponible', 'danger'); return; }
    const gestanteId = $('rGestanteId').value;
    if(!gestanteId) { showAlert('Debe seleccionar una gestante', 'warning'); return; }
    const data = {
        gestante_id: gestanteId, consultorio_id: currentProfile?.consultorio_id,
        semana_epidemiologica: parseInt($('rSemanaEpi').value), anio: parseInt($('rAnio').value),
        fecha_registro: $('rFecha').value, tipo_registro: $('rTipoRegistro').value,
        captacion_casa_casa: $('rCaptacionCasa').value === 'true', condicion: $('rCondicion').value,
        edad_gestacional_actual: parseInt($('rEdadGestacional').value) || null,
        num_control_prenatal: parseInt($('rNumControl').value) || null,
        tipo_consulta: $('rTipoConsulta').value || null, motivo_consulta: $('rMotivo').value,
        diagnostico: $('rDiagnostico').value, referido: $('rReferido').value === 'true',
        establecimiento_referencia: $('rEstablecimientoRef').value, observaciones: $('rObservaciones').value,
        registrado_por: currentUser.id
    };
    try {
        const { error } = await supabase.from('registros_ruta_materna').insert([data]);
        if(error) throw error;
        showAlert('Registro guardado correctamente', 'success');
        closeModal();
        if(currentSection === 'registros') loadRegistros(); else if(currentSection === 'dashboard') loadDashboardData();
    } catch(e) { showAlert('Error al guardar: ' + e.message, 'danger'); }
}

async function renderUsuarios(container) {

        return;
    }
    if(currentProfile.rol !== 'super_admin') {
        container.innerHTML = '<div class="alert alert-danger">No tiene permisos para acceder a esta sección. Su rol actual es: <strong>' + currentProfile.rol + '</strong></div>';
        return;
    }
    container.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div class="card-title">Gestión de Usuarios</div>
                <button class="btn btn-success" onclick="openModal('usuario')"><span>➕</span> Nuevo Usuario</button>
            </div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Rol</th>
                                <th>Consultorio</th>
                                <th>Registro</th>
                                <th>Acciones</th>

                        </thead>

                    </table>
                </div>

                </div>
            </div>
        </div>
    `;

async function loadUsuarios() {
    if (!supabase) return;
    try {
        const { data, error } = await supabase
            .from('perfiles_usuarios')
            .select('*, consultorios(nombre)')
            .order('created_at', { ascending: false });
        usuariosData = data || [];
        const tbody = $('usuariosTableBody');
        if(error || !usuariosData.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay usuarios registrados</td></tr>'; return;
        }
        tbody.innerHTML = usuariosData.map(u => {
            const rolClass = { 'super_admin': 'badge-superadmin', 'admin': 'badge-admin', 'consultorio': 'badge-consultorio' }[u.rol] || 'badge-consultorio';
            const rolLabel = { 'super_admin': 'Super Admin', 'admin': 'Administrador', 'consultorio': 'Consultorio' }[u.rol] || u.rol;
            return `
                <tr>
                    <td><strong>${u.nombre_completo || '-'}</strong></td>
                    <td>${u.email || '-'}</td>
                    <td><span class="badge ${rolClass}">${rolLabel}</span></td>
                    <td>${u.consultorios?.nombre || 'No asignado'}</td>
                    <td>${formatDate(u.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editarUsuario('${u.id}')">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarUsuario('${u.id}')">🗑️</button>
                    </td>
                </tr>`;
        }).join('');
    } catch(e) {
        console.error('Error loading users:', e);
        $('usuariosTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error al cargar usuarios</td></tr>';
    }
}

async function guardarUsuario() {
    if (!supabase) { showAlert('Error: Supabase no disponible', 'danger'); return; }

    // CORREGIDO: Verificar permisos antes de guardar
    if(!currentProfile || currentProfile.rol !== 'super_admin') {
        showAlert('No tiene permisos para gestionar usuarios', 'danger');
        return;
    }

    const id = $('uId').value;
    const email = $('uEmail').value.trim();
    const nombre = $('uNombre').value.trim();
    const rol = $('uRol').value;
    const consultorioId = $('uConsultorio').value || null;

    if(!email || !nombre || !rol) { showAlert('Complete todos los campos obligatorios', 'warning'); return; }

    if(!id) {
        const pass = $('uPassword').value;
        const pass2 = $('uPassword2').value;
        if(!pass || pass.length < 6) { showAlert('La contraseña debe tener al menos 6 caracteres', 'warning'); return; }
        if(pass !== pass2) { showAlert('Las contraseñas no coinciden', 'warning'); return; }

        try {
            // Guardar sesión actual del admin para restaurarla después
            const { data: { session: adminSession } } = await supabase.auth.getSession();

            const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password: pass });
            if(signUpError) throw signUpError;
            if(!signUpData.user) throw new Error('No se pudo crear el usuario');

            // Restaurar sesión del admin inmediatamente
            if(adminSession) {
                await supabase.auth.setSession({
                    access_token: adminSession.access_token,
                    refresh_token: adminSession.refresh_token
                });
                currentUser = adminSession.user;
                await loadUserProfile();
            }

            // Insertar perfil
            const { error: perfilError } = await supabase.from('perfiles_usuarios').insert([{
                id: signUpData.user.id, email, nombre_completo: nombre, rol, consultorio_id: consultorioId
            }]);
            if(perfilError) throw perfilError;

            showAlert('Usuario creado correctamente', 'success');
            closeModal(); loadUsuarios();
        } catch(e) {
            showAlert('Error al crear usuario: ' + e.message, 'danger');
        }
    } else {
        try {
            const { error } = await supabase.from('perfiles_usuarios').update({
                nombre_completo: nombre, rol, consultorio_id: consultorioId
            }).eq('id', id);
            if(error) throw error;
            showAlert('Usuario actualizado correctamente', 'success');
            closeModal(); loadUsuarios();
        } catch(e) {
            showAlert('Error al actualizar: ' + e.message, 'danger');
        }
    }
}

function editarUsuario(id) {
    openModal('usuario', id);
}

async function eliminarUsuario(id) {
    if (!supabase) return;

    // CORREGIDO: Verificar permisos antes de eliminar
    if(!currentProfile || currentProfile.rol !== 'super_admin') {
        showAlert('No tiene permisos para eliminar usuarios', 'danger');
        return;
    }

    const u = usuariosData.find(x => x.id === id);
    if(!u) return;
    if(!confirm(`¿Está seguro de eliminar al usuario "${u.nombre_completo || u.email}"?\n\nEsto eliminará su perfil del sistema. Para eliminar también su acceso de autenticación, deberá hacerlo desde el panel de Supabase.`)) return;

    try {
        const { error } = await supabase.from('perfiles_usuarios').delete().eq('id', id);
        if(error) throw error;
        showAlert('Usuario eliminado del sistema', 'success');
        loadUsuarios();
    } catch(e) {
        showAlert('Error al eliminar: ' + e.message, 'danger');
    }
}

function handleFileSelect(event) {
    const file = event.target.files[0];
    if(file) procesarArchivoCalendario(file);
}

function handleFileDrop(event) {
    event.preventDefault();
    event.currentTarget.classList.remove('dragover');
    const file = event.dataTransfer.files[0];
    if(file) procesarArchivoCalendario(file);
}

function procesarArchivoCalendario(file) {
    // Validar tipo y tamaño
    const tiposPermitidos = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png'];
    if(!tiposPermitidos.includes(file.type)) {
        showAlert('Formato no válido. Use PDF, JPG o PNG.', 'danger');
        return;
    }
    if(file.size > 5 * 1024 * 1024) {
        showAlert('El archivo es demasiado grande. Máximo 5MB.', 'danger');
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const dataUrl = e.target.result;
        calendarioEpidemiologicoData = {
            nombre: file.name,
            tipo: file.type,
            data: dataUrl,
            fecha_subida: new Date().toISOString()
        };

        // Guardar en localStorage
        localStorage.setItem('ruta_materna_calendario', JSON.stringify(calendarioEpidemiologicoData));

        mostrarPreviewCalendario();
        showAlert('Calendario subido correctamente', 'success');
    };
    reader.readAsDataURL(file);
}

function mostrarPreviewCalendario() {
    if(!calendarioEpidemiologicoData) return;

    const container = $('calendarioPreviewContainer');
    const preview = $('calendarioPreview');

    if(calendarioEpidemiologicoData.tipo === 'application/pdf') {
        preview.innerHTML = `<embed src="${calendarioEpidemiologicoData.data}" type="application/pdf" width="100%" height="400px" style="border-radius:8px;">`;
    } else {
        preview.innerHTML = `<img src="${calendarioEpidemiologicoData.data}" class="calendario-preview" alt="Calendario Epidemiológico">`;
    }

    container.classList.remove('hidden');
}

async function cargarPreviewCalendario() {
    const guardado = localStorage.getItem('ruta_materna_calendario');
    if(guardado) {
        try {
            calendarioEpidemiologicoData = JSON.parse(guardado);
            mostrarPreviewCalendario();
        } catch(e) {
            console.error('Error cargando calendario:', e);
        }
    }
}

function eliminarCalendario() {
    if(!confirm('¿Eliminar el calendario epidemiológico subido?')) return;
    calendarioEpidemiologicoData = null;
    localStorage.removeItem('ruta_materna_calendario');
    $('calendarioPreviewContainer').classList.add('hidden');
    showAlert('Calendario eliminado', 'info');
}

async function generarConsolidado() {
    if (!supabase) return;
    const semana = parseInt($('consSemana').value);
    const anio = parseInt($('consAnio').value);
    try {
        const { data: registros, error } = await supabase.from('registros_ruta_materna').select('*, gestantes(*), consultorios(*)').eq('semana_epidemiologica', semana).eq('anio', anio);
        if(error) throw error;
        const container = $('consolidadoResultado');
        const consolidado = {};
        (registros || []).forEach(r => {
            const cons = r.consultorios?.nombre || 'Sin Consultorio';
            if(!consolidado[cons]) consolidado[cons] = { captacion: 0, control: 0, emergencia: 0, referencia: 0, total: 0 };
            consolidado[cons][r.tipo_registro]++; consolidado[cons].total++;
        });
        const totalGeneral = { captacion: 0, control: 0, emergencia: 0, referencia: 0, total: 0 };
        let html = `<div class="table-container"><table class="data-table" id="consolidadoTable"><thead><tr><th>Consultorio</th><th>Captación</th><th>Control</th><th>Emergencia</th><th>Referencia</th><th>Total</th></tr></thead><tbody>`;
        Object.entries(consolidado).forEach(([cons, datos]) => {
            totalGeneral.captacion += datos.captacion; totalGeneral.control += datos.control;
            totalGeneral.emergencia += datos.emergencia; totalGeneral.referencia += datos.referencia; totalGeneral.total += datos.total;
            html += `<tr><td><strong>${cons}</strong></td><td>${datos.captacion}</td><td>${datos.control}</td><td>${datos.emergencia}</td><td>${datos.referencia}</td><td><strong>${datos.total}</strong></td></tr>`;
        });
        html += `<tr style="background:var(--color-gray-200);font-weight:bold;"><td>TOTAL GENERAL</td><td>${totalGeneral.captacion}</td><td>${totalGeneral.control}</td><td>${totalGeneral.emergencia}</td><td>${totalGeneral.referencia}</td><td>${totalGeneral.total}</td></tr></tbody></table></div>
        <div style="margin-top:20px;"><h4 style="color:var(--color-primary);margin-bottom:10px;">Resumen Gráfico</h4><div class="stats-grid">
            <div class="stat-card"><div class="stat-icon primary">📋</div><div class="stat-info"><div class="stat-value">${totalGeneral.total}</div><div class="stat-label">Total Registros SE ${semana}</div></div></div>
            <div class="stat-card"><div class="stat-icon success">✅</div><div class="stat-info"><div class="stat-value">${totalGeneral.control}</div><div class="stat-label">Controles (${totalGeneral.total > 0 ? Math.round(totalGeneral.control/totalGeneral.total*100) : 0}%)</div></div></div>
            <div class="stat-card"><div class="stat-icon warning">🎯</div><div class="stat-info"><div class="stat-value">${totalGeneral.captacion}</div><div class="stat-label">Captaciones</div></div></div>
        </div></div>`;
        container.innerHTML = html;
    } catch(e) { $('consolidadoResultado').innerHTML = '<div class="alert alert-danger">Error al generar consolidado</div>'; }
}

function descargarConsolidadoExcel() {
    const table = $('consolidadoTable');
    if(!table) { showAlert('Primero genere el consolidado', 'warning'); return; }
    const wb = XLSX.utils.table_to_book(table, {sheet: "Consolidado EPI 13"});
    XLSX.writeFile(wb, `Consolidado_EPI13_SE${$('consSemana').value}_${$('consAnio').value}.xlsx`);
    showAlert('Consolidado descargado correctamente', 'success');
}

// ============================================================
// CONSULTORIOS
// ============================================================

async function renderConsultorios(container) {
    container.innerHTML = `
        <div class="card">
            <div class="card-header"><div class="card-title">Consultorios del ASIC</div></div>
            <div class="card-body">
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th>Código</th><th>Nombre</th><th>Estado</th></tr></thead>
                        <tbody id="consultoriosTableBody"><tr><td colspan="3" class="text-center">Cargando...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    `;
    if(!supabase) return;
    try {
        const { data, error } = await supabase.from('consultorios').select('*').order('nombre');
        consultoriosData = data || [];
        const tbody = $('consultoriosTableBody');
        if(error || !consultoriosData.length) { tbody.innerHTML = '<tr><td colspan="3" class="text-center">No hay consultorios registrados</td></tr>'; return; }
        tbody.innerHTML = consultoriosData.map(c => `<tr><td><code>${c.codigo}</code></td><td>${c.nombre}</td><td>${c.activo ? '✅ Activo' : '❌ Inactivo'}</td></tr>`).join('');
    } catch(e) { console.error('Error loading consultorios:', e); }
}

// ============================================================
// FUNCIONES AUXILIARES
// ============================================================

function verGestante(id) {
    const g = gestantesData.find(x => x.id === id);
    if(!g) return;
    const semanas = calcularSemanas(g.fur);
    const fpp = calcularFPP(g.fur);
    alert(`GESTANTE: ${g.nombres} ${g.apellidos}\nCédula: ${g.cedula}\nEdad: ${g.edad || '-'} años\nEstado: ${g.estado_actual}\nSemanas: ${semanas > 0 ? semanas : '-'}\nFPP: ${fpp ? formatDate(fpp) : '-'}\nControl: ${g.en_control_prenatal ? 'Sí' : 'No'}\nTeléfono: ${g.telefono || '-'}\nDirección: ${g.direccion || '-'}`.trim());
}

function editarGestante(id) { openModal('gestante', id); }

function nuevoRegistroGestante(gestanteId) {
    openModal('registro');
    setTimeout(() => {
        const g = gestantesData.find(x => x.id === gestanteId);
        if(g && $('rGestanteId')) seleccionarGestante(g.id, g.cedula, `${g.nombres} ${g.apellidos}`, g.fur);
    }, 100);
}

function verRegistro(id) {
    const r = registrosData.find(x => x.id === id);
    if(!r) return;
    alert(`REGISTRO: ${r.tipo_registro.toUpperCase()}\nFecha: ${formatDate(r.fecha_registro)}\nGestante: ${r.gestantes?.nombres || ''} ${r.gestantes?.apellidos || ''}\nDiagnóstico: ${r.diagnostico || '-'}\nObservaciones: ${r.observaciones || '-'}`.trim());
}

function editarRegistro(id) { showAlert('Función de edición en desarrollo', 'info'); }

    cargarConfigGuardada();
