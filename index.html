<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Rehabilitación Leoncio Páez - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo-icon">❤️+</div>
                <h1>Sala de Rehabilitación</h1>
                <h2>Leoncio Páez</h2>
                <p class="subtitle">San Fernando, Estado Apure</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">📧 Correo Electrónico</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="usuario@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="••••••••">
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">
                        <span class="btn-icon">🔑</span> INGRESAR
                    </button>
                    <button type="button" class="btn-secondary" onclick="limpiarFormulario()">
                        <span class="btn-icon">🔄</span> CANCELAR
                    </button>
                </div>
            </form>
            
            <div class="login-footer">
                <p>Sistema de Información Web v1.0</p>
                <p>© 2025 Universidad Politécnica Territorial del Alto Apure</p>
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
