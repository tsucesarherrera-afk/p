<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rehabilitación Leoncio Páez</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fdf8f0 0%, #f9e9d7 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,250,240,0.95);
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .main-header {
            background: linear-gradient(95deg, #b55b2c, #d8925e);
            padding: 1rem 2rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .user-welcome {
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        button, .btn {
            background: #d88c54;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover { background: #b56230; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }
        .btn-outline:hover { background: white; color: #b56230; }
        .btn-danger { background: #c24a3a; }
        .btn-success { background: #2f8b5c; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0 16px;
            border: 1px solid #e2cbb9;
            border-radius: 28px;
            background: #fffcf8;
        }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1.5rem; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #f0e0d0; }
        th { background: #f6ede4; color: #7b4a2a; }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
        }
        .toast-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2c6e3c;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            z-index: 1200;
        }
        .inactivity-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: white;
            padding: 2rem;
            border-radius: 32px;
            text-align: center;
            z-index: 2000;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        @media (max-width:768px) { .main-header { flex-direction: column; gap:10px; text-align:center; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="main-header">
        <div class="logo-area">
            <h1><i class="fas fa-hand-holding-heart"></i> Rehabilitación Leoncio Páez</h1>
            <p>Centro de Medicina Física y Rehabilitación</p>
        </div>
        <div id="headerUserInfo" class="user-welcome"></div>
    </div>
    <div id="dynamicContent" style="padding: 2rem;"></div>
</div>

<script>
    // ===================== CONFIGURACIÓN =====================
    // >>> REEMPLAZA CON TUS DATOS REALES DE SUPABASE <<<
    const SUPABASE_URL = 'https://zrdyhalokzcdartdlgrn.supabase.co';   // Cámbialo
    const SUPABASE_ANON_KEY = 'sb_publishable_vIesD6EbjZa-Xj2-zeB42g_yi6YzYAX';                 // Cámbialo
    // Si no quieres usar Supabase aún, pon USE_MOCK = true
    const USE_MOCK = true;  // Cambia a false cuando tengas las credenciales reales

    let supabase;
    if (!USE_MOCK) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
        // Mock de supabase para pruebas sin conexión
        supabase = {
            from: () => ({
                select: () => ({ eq: () => ({ single: async () => ({ data: null, error: null }) }) }),
                insert: async () => ({ error: null }),
                update: () => ({ eq: async () => ({ error: null }) }),
                delete: () => ({ eq: async () => ({ error: null }) })
            }),
            auth: {
                signInWithPassword: async () => ({ data: { user: { id: 'mock' } }, error: null })
            },
            rpc: async () => ({ error: null })
        };
        console.log("⚠️ Modo MOCK activado. Las operaciones no persistirán datos reales.");
    }

    // Variables globales
    let currentUser = null;
    let inactivityTimer = null;
    let warningTimer = null;

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#b33' : '#2c6e3c';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Inactividad
    function resetInactivity() {
        if (inactivityTimer) clearTimeout(inactivityTimer);
        if (warningTimer) clearTimeout(warningTimer);
        if (!currentUser) return;
        inactivityTimer = setTimeout(() => showInactivityWarning(), 9 * 60 * 1000);
    }
    function showInactivityWarning() {
        if (document.getElementById('inactivityWarning')) return;
        const div = document.createElement('div');
        div.id = 'inactivityWarning';
        div.className = 'inactivity-warning';
        div.innerHTML = `<i class="fas fa-hourglass-half" style="font-size:48px;color:#d88c54"></i>
                         <h3>⚠️ Sesión a punto de expirar</h3>
                         <p>Por inactividad, se cerrará en 30 segundos.</p>
                         <button id="continueSession" class="btn-success">Continuar sesión</button>`;
        document.body.appendChild(div);
        warningTimer = setTimeout(() => { logout(); hideWarning(); showToast('Sesión cerrada por inactividad'); }, 30000);
        document.getElementById('continueSession').onclick = () => { hideWarning(); resetInactivity(); showToast('Sesión extendida'); };
    }
    function hideWarning() { const w = document.getElementById('inactivityWarning'); if(w) w.remove(); if(warningTimer) clearTimeout(warningTimer); }
    function attachEvents() {
        ['mousemove','keydown','click'].forEach(ev => window.addEventListener(ev, () => { if(currentUser) resetInactivity(); }));
    }

    // Cerrar sesión
    function logout() {
        if(!currentUser) return;
        if(!confirm('¿Está seguro que desea cerrar sesión?')) return;
        currentUser = null;
        localStorage.removeItem('user_session');
        renderLogin();
        showToast('Sesión cerrada');
    }

    // ===================== LOGIN & REGISTRO =====================
    async function loginUser(email, password) {
        try {
            if(USE_MOCK) {
                // Simular login exitoso con rol patient (para pruebas)
                currentUser = { id: 'mock123', email, role: 'patient', full_name: 'Usuario Mock' };
                localStorage.setItem('user_session', JSON.stringify({ id: currentUser.id, role: currentUser.role }));
                renderDashboardByRole();
                resetInactivity();
                attachEvents();
                showToast(`Bienvenido ${currentUser.full_name}`);
                return;
            }
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if(error) throw new Error(error.message);
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
            if(profile.locked) throw new Error('Cuenta bloqueada');
            currentUser = profile;
            localStorage.setItem('user_session', JSON.stringify({ id: currentUser.id, role: currentUser.role }));
            renderDashboardByRole();
            resetInactivity();
            attachEvents();
            showToast(`Bienvenido ${currentUser.full_name || currentUser.email}`);
        } catch(err) {
            showToast(err.message, true);
        }
    }

    async function registerPatient(data) {
        if(USE_MOCK) {
            showToast('Registro simulado. Revisa tu correo (mock).');
            renderLogin();
            return;
        }
        try {
            const { data: exist } = await supabase.from('patients').select('cedula').eq('cedula', data.cedula).single();
            if(exist) throw new Error('Cédula ya registrada');
            const res = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: data.email, role: 'patient', full_name: `${data.first_name} ${data.last_name}`, phone: data.phone, patient_data: data })
            });
            if(!res.ok) throw new Error('Error al crear usuario');
            showToast('Registro exitoso. Revisa tu correo.');
            renderLogin();
        } catch(err) {
            showToast(err.message, true);
        }
    }

    // ===================== VISTAS =====================
    function renderLogin() {
        document.getElementById('headerUserInfo').innerHTML = '';
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width:480px; margin:0 auto;">
                <h2><i class="fas fa-sign-in-alt"></i> Acceso</h2>
                <form id="loginForm">
                    <label>Correo</label><input type="email" id="loginEmail" required>
                    <label>Contraseña</label><input type="password" id="loginPassword" required>
                    <button type="submit" style="width:100%">Ingresar</button>
                </form>
                <hr>
                <p>¿Nuevo paciente? <button id="goRegister" class="btn-outline" style="background:#c17b4c;">Registrarse</button></p>
            </div>
        `;
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        });
        document.getElementById('goRegister').onclick = () => renderRegister();
    }

    function renderRegister() {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="card" style="max-width:600px; margin:0 auto;">
                <h2>Registro de paciente</h2>
                <form id="regForm">
                    <div class="grid-2">
                        <div><label>Nombres</label><input id="regNombre" required></div>
                        <div><label>Apellidos</label><input id="regApellido" required></div>
                        <div><label>Cédula</label><input id="regCedula" required></div>
                        <div><label>Fecha nacimiento</label><input type="date" id="regFecha" required></div>
                        <div><label>Celular</label><input id="regCelular" required></div>
                        <div><label>Correo</label><input type="email" id="regEmail" required></div>
                    </div>
                    <button type="submit" class="btn-success">Registrarse</button>
                    <button type="button" id="backLogin" style="background:#aaa;">Volver</button>
                </form>
            </div>
        `;
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                first_name: document.getElementById('regNombre').value,
                last_name: document.getElementById('regApellido').value,
                cedula: document.getElementById('regCedula').value,
                birth_date: document.getElementById('regFecha').value,
                phone: document.getElementById('regCelular').value,
                email: document.getElementById('regEmail').value
            };
            await registerPatient(data);
        });
        document.getElementById('backLogin').onclick = () => renderLogin();
    }

    async function renderDashboardByRole() {
        if(!currentUser) return renderLogin();
        document.getElementById('headerUserInfo').innerHTML = `
            <span><i class="fas fa-user-circle"></i> ${currentUser.full_name || currentUser.email} (${currentUser.role})</span>
            <button id="logoutBtn" class="btn-outline"><i class="fas fa-sign-out-alt"></i> Cerrar</button>
        `;
        document.getElementById('logoutBtn').onclick = () => logout();
        const container = document.getElementById('dynamicContent');
        const role = currentUser.role;
        if(role === 'super_admin') renderSuperAdmin(container);
        else if(role === 'admin') renderAdmin(container);
        else if(role === 'assistant') renderAssistant(container);
        else if(role === 'physiatrist') renderPhysiatrist(container);
        else if(role === 'patient') renderPatient(container);
        else renderLogin();
    }

    // ========== PANEL SUPER ADMIN (con enlace para crear usuarios) ==========
    function renderSuperAdmin(container) {
        container.innerHTML = `
            <h2><i class="fas fa-crown"></i> Super Administrador</h2>
            <div class="card">
                <button id="createUserLink"><i class="fas fa-user-plus"></i> Crear nuevo usuario</button>
                <button id="listUsersBtn">Listar usuarios</button>
                <button id="holidaysBtn">Gestionar feriados</button>
            </div>
            <div id="subContent"></div>
        `;
        document.getElementById('createUserLink').onclick = () => showCreateUserModal();
        document.getElementById('listUsersBtn').onclick = () => listAllUsers();
        document.getElementById('holidaysBtn').onclick = () => manageHolidays();
        listAllUsers();
    }

    async function listAllUsers() {
        const sub = document.getElementById('subContent');
        if(USE_MOCK) {
            sub.innerHTML = `<p>Modo MOCK: Usuarios de ejemplo</p><ul><li>admin@test.com (admin)</li><li>asistente@test.com (assistant)</li></ul>`;
            return;
        }
        const { data, error } = await supabase.from('profiles').select('id, email, role, full_name, locked');
        if(error) { sub.innerHTML = '<p>Error</p>'; return; }
        sub.innerHTML = `<div class="table-responsive"><table><thead><tr><th>Email</th><th>Rol</th><th>Nombre</th><th>Bloqueado</th><th>Acciones</th></tr></thead><tbody>
            ${data.map(u => `<tr><td>${u.email}</td><td>${u.role}</td><td>${u.full_name || '-'}</td><td>${u.locked ? 'Sí' : 'No'}</td>
            <td><button onclick="window.unlockUser('${u.id}')">Desbloquear</button> <button onclick="window.deleteUser('${u.id}')">Eliminar</button></td></tr>`).join('')}
        </tbody></table></div>`;
        window.unlockUser = async (id) => { await supabase.from('profiles').update({ locked: false, failed_attempts: 0 }).eq('id', id); listAllUsers(); showToast('Desbloqueado'); };
        window.deleteUser = async (id) => { if(confirm('¿Eliminar?')) { await supabase.rpc('delete_user_cascade', { user_id: id }); listAllUsers(); } };
    }

    function showCreateUserModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `<div class="modal-content"><h3>Crear usuario</h3>
            <label>Email</label><input id="newEmail" type="email">
            <label>Rol</label><select id="newRole"><option value="admin">Administrador</option><option value="assistant">Asistente</option><option value="physiatrist">Fisiatra</option><option value="patient">Paciente</option></select>
            <label>Nombre completo</label><input id="newFullname">
            <button id="confirmCreate">Crear y enviar clave</button>
            <button id="cancelModal">Cancelar</button></div>`;
        document.body.appendChild(modal);
        document.getElementById('confirmCreate').onclick = async () => {
            const email = document.getElementById('newEmail').value;
            const role = document.getElementById('newRole').value;
            const fullname = document.getElementById('newFullname').value;
            if(USE_MOCK) { showToast(`Usuario ${email} creado (mock)`); modal.remove(); listAllUsers(); return; }
            const res = await fetch(`${SUPABASE_URL}/functions/v1/create-user`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, role, full_name: fullname, sendMail: true })
            });
            if(res.ok) showToast('Usuario creado, clave enviada al correo');
            else showToast('Error', true);
            modal.remove();
            listAllUsers();
        };
        document.getElementById('cancelModal').onclick = () => modal.remove();
    }

    async function manageHolidays() {
        const sub = document.getElementById('subContent');
        if(USE_MOCK) { sub.innerHTML = `<p>Modo MOCK: Feriados: 2025-01-01 (Año Nuevo)</p>`; return; }
        const { data } = await supabase.from('holidays').select('*');
        sub.innerHTML = `<div class="card"><h3>Feriados</h3><button id="addHoliday">+ Agregar</button><ul>${data.map(h => `<li>${h.holiday_date} - ${h.description} <button onclick="deleteHoliday(${h.id})">Eliminar</button></li>`).join('')}</ul></div>`;
        document.getElementById('addHoliday').onclick = () => { let d = prompt('Fecha (YYYY-MM-DD)'); let desc = prompt('Descripción'); if(d && desc) supabase.from('holidays').insert({ holiday_date: d, description: desc }).then(() => manageHolidays()); };
        window.deleteHoliday = async (id) => { await supabase.from('holidays').delete().eq('id', id); manageHolidays(); };
    }

    // ========== OTROS PANELES (simplificados pero sin errores) ==========
    function renderAdmin(container) {
        container.innerHTML = `<h2>Panel Administrador</h2><div class="card"><button id="adminPacientes">Pacientes</button><button id="adminCitas">Citas</button><button id="adminAsistencia">Asistencia</button></div><div id="adminSub"></div>`;
        document.getElementById('adminPacientes').onclick = () => adminManagePatients();
        document.getElementById('adminCitas').onclick = () => adminManageAppointments();
        document.getElementById('adminAsistencia').onclick = () => adminAttendance();
        adminManagePatients();
    }
    async function adminManagePatients() {
        const sub = document.getElementById('adminSub');
        if(USE_MOCK) { sub.innerHTML = `<p>Lista de pacientes (mock): Juan Pérez, Ana Gómez</p>`; return; }
        const { data } = await supabase.from('patients').select('*');
        sub.innerHTML = `<div class="table-responsive"><table><tr><th>Cédula</th><th>Nombre</th><th>Email</th><th>Acciones</th></tr>${data.map(p => `<tr><td>${p.cedula}</td><td>${p.first_name} ${p.last_name}</td><td>${p.email}</td><td><button onclick="editPatient('${p.id}')">Editar</button><button onclick="deletePatient('${p.id}')">Eliminar</button></td></tr>`).join('')}</table><button id="newPatient">+ Nuevo paciente</button></div>`;
    }
    async function adminManageAppointments() { document.getElementById('adminSub').innerHTML = `<p>Gestión de citas (implementar similar)</p>`; }
    async function adminAttendance() { document.getElementById('adminSub').innerHTML = `<p>Verificar asistencia</p>`; }

    function renderAssistant(container) {
        container.innerHTML = `<h2>Asistente</h2><div class="card"><button id="assistPacientes">Pacientes</button><button id="assistCitas">Citas (reprogramar)</button><button id="assistConfirmar">Confirmar asistencia</button></div><div id="assistSub"></div>`;
        document.getElementById('assistPacientes').onclick = () => { document.getElementById('assistSub').innerHTML = `<p>Lista de pacientes (asistente)</p>`; };
        document.getElementById('assistCitas').onclick = () => { document.getElementById('assistSub').innerHTML = `<p>Reprogramar citas</p>`; };
        document.getElementById('assistConfirmar').onclick = () => { document.getElementById('assistSub').innerHTML = `<p>Confirmar asistencia del paciente</p>`; };
    }

    function renderPhysiatrist(container) {
        container.innerHTML = `<h2>Fisiatra</h2><div class="card"><button id="historialBtn">Historias médicas</button><button id="nuevaCitaBtn">Asignar nueva cita</button></div><div id="physSub"></div>`;
        document.getElementById('historialBtn').onclick = () => { document.getElementById('physSub').innerHTML = `<p>Gestión de historias clínicas</p>`; };
        document.getElementById('nuevaCitaBtn').onclick = () => { document.getElementById('physSub').innerHTML = `<p>Formulario para nueva cita</p>`; };
    }

    function renderPatient(container) {
        container.innerHTML = `<h2>Paciente</h2><div class="card"><button id="solicitarCita">Solicitar cita</button><button id="miHistoria">Mi historia médica</button><button id="misDatos">Mis datos</button></div><div id="patientSub"></div>`;
        document.getElementById('solicitarCita').onclick = () => { document.getElementById('patientSub').innerHTML = `<input type="date" id="citaDate"><button onclick="alert('Cita solicitada (mock)')">Enviar</button>`; };
        document.getElementById('miHistoria').onclick = () => { document.getElementById('patientSub').innerHTML = `<p>Historia médica: ...</p>`; };
        document.getElementById('misDatos').onclick = () => { document.getElementById('patientSub').innerHTML = `<p>Nombre: ${currentUser.full_name || 'Paciente'}, Email: ${currentUser.email}</p>`; };
    }

    // ===================== INICIO =====================
    (async function init() {
        const stored = localStorage.getItem('user_session');
        if(stored && !USE_MOCK) {
            try {
                const { id } = JSON.parse(stored);
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', id).single();
                if(profile) { currentUser = profile; renderDashboardByRole(); resetInactivity(); attachEvents(); return; }
            } catch(e) {}
        } else if(stored && USE_MOCK) {
            // mock session
            currentUser = { id: 'mock', email: 'mock@test.com', role: 'patient', full_name: 'Usuario Mock' };
            renderDashboardByRole();
            resetInactivity();
            attachEvents();
            return;
        }
        renderLogin();
        attachEvents();
    })();
</script>
</body>
</html>
